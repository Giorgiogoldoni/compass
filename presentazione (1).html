<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — Presentazione</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C9A84C;--gold2:#E8C96A;--gold3:#8B6914;
  --ink:#0D0D1A;--paper:#F7F4EE;--paper2:#EDE8DF;
  --text:#1A1828;--text2:#6B6580;
  --green:#1A6B3A;--red:#8B1A1A;--blue:#1A3A6B;
  --border:#D4CDB8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--text);font-size:11px;line-height:1.7;}

/* TOOLBAR */
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--ink);border-bottom:1px solid var(--gold3);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:48px;}
.toolbar-brand{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);letter-spacing:1px;}
.toolbar-brand span{color:rgba(255,255,255,0.35);font-size:9px;margin-left:8px;}
.btn-print{background:var(--gold);color:var(--ink);border:none;padding:8px 18px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:1px;cursor:pointer;border-radius:2px;}
.btn-print:hover{background:var(--gold2);}
.btn-back{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.2);padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:2px;text-decoration:none;display:inline-block;}
.btn-back:hover{border-color:var(--gold);color:var(--gold);}

/* BOOK */
.book{max-width:1000px;margin:68px auto 60px;padding:0 32px;}

/* PAGE BREAK */
.page{page-break-before:always;margin-bottom:80px;}
.page:first-child{page-break-before:avoid;}

/* COVER */
.cover{min-height:80vh;display:flex;flex-direction:column;justify-content:center;padding:80px 0 60px;border-bottom:3px solid var(--gold);position:relative;}
.cover-eyebrow{font-size:9px;letter-spacing:4px;color:var(--gold3);text-transform:uppercase;margin-bottom:24px;}
.cover-title{font-family:'Playfair Display',serif;font-size:64px;font-weight:700;color:var(--ink);line-height:1.05;margin-bottom:12px;}
.cover-title em{color:var(--gold3);font-style:italic;}
.cover-sub{font-family:'Playfair Display',serif;font-size:22px;color:var(--text2);font-style:italic;margin-bottom:48px;}
.cover-tag{display:inline-block;background:var(--gold);color:var(--ink);padding:6px 16px;font-size:9px;letter-spacing:3px;font-weight:500;margin-bottom:40px;}
.cover-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:700px;}
.cstat{border-top:2px solid var(--gold);padding-top:12px;}
.cstat-val{font-family:'Playfair Display',serif;font-size:30px;font-weight:600;color:var(--ink);display:block;}
.cstat-label{font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-top:2px;display:block;}
.cover-footer{position:absolute;bottom:0;right:0;font-size:8px;color:var(--text2);letter-spacing:2px;}

/* SECTION */
.section-eyebrow{font-size:8px;letter-spacing:4px;color:var(--gold3);text-transform:uppercase;}
.section-h2{font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:var(--ink);margin-bottom:6px;}
.section-head{border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:28px;}

/* METODOLOGIA */
.method-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-bottom:32px;}
.method-card{background:white;border:1px solid var(--border);padding:20px;border-top:3px solid var(--gold);}
.method-card h4{font-size:10px;letter-spacing:2px;color:var(--gold3);text-transform:uppercase;margin-bottom:10px;}
.method-card p{color:var(--text2);line-height:1.8;font-size:10px;}

/* SCENARI */
.scenari-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:32px;}
.scenario-card{padding:16px;border-radius:3px;border:1px solid var(--border);}
.scenario-name{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;margin-bottom:6px;}
.scenario-desc{font-size:9px;color:var(--text2);line-height:1.7;}

/* RANKING */
.rank-table{width:100%;border-collapse:collapse;font-size:10px;}
.rank-table th{font-size:7px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;padding:8px 10px;border-bottom:2px solid var(--ink);background:var(--paper2);}
.rank-table td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.rank-table tr:hover td{background:rgba(201,168,76,0.03);}

/* PROFILI */
.profili-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:32px;}
.profilo-card{border:1px solid var(--border);overflow:hidden;}
.profilo-header{padding:16px;color:white;}
.profilo-body{padding:16px;}
.profilo-kpi{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:10px;}
.profilo-kpi:last-child{border:none;}

/* METRICHE */
.formula-block{background:white;border:1px solid var(--border);border-left:4px solid var(--gold);padding:20px 24px;margin-bottom:16px;}
.formula-title{font-size:10px;font-weight:500;color:var(--ink);letter-spacing:1px;margin-bottom:8px;}
.formula-code{font-size:10px;color:var(--blue);background:var(--paper2);padding:10px 14px;border-radius:2px;line-height:2;margin-bottom:8px;white-space:pre-wrap;}
.formula-desc{font-size:9px;color:var(--text2);line-height:1.8;}

/* DISCLAIMER */
.disclaimer{background:var(--paper2);border:1px solid var(--border);padding:24px;font-size:9px;color:var(--text2);line-height:1.9;}
.disclaimer strong{color:var(--text);}

/* HEATMAP */
.hmap-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:7.5px;font-weight:500;}

/* CHART */
canvas{max-width:100%;}

/* PRINT */
@media print{
  .toolbar{display:none!important;}
  body{background:white;margin:0;}
  .book{margin-top:0;padding:15mm;max-width:none;}
  .cover{min-height:auto;padding:20mm 0 15mm;}
  .page{page-break-before:always;}
  .method-card,.scenario-card,.profilo-card{break-inside:avoid;}
  @page{size:A4;margin:15mm;}
}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--text2);}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-brand">COMPASS <span>PRESENTAZIONE</span></div>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="update-info" style="font-size:9px;color:rgba(255,255,255,0.3)">—</span>
    <a href="advisor.html" class="btn-back">← Advisor</a>
    <a href="libro.html" class="btn-back">📖 Libro</a>
    <button class="btn-print" onclick="window.print()">🖨 Stampa PDF</button>
  </div>
</div>

<div class="book">
  <div id="loading" class="loading"><div class="spinner"></div>Caricamento...</div>
  <div id="content" style="display:none"></div>
</div>

<script>
const BASE='data/';
const SCENARI_INFO={
  goldilocks:{col:'#1A6B3A',nome:'Goldilocks',desc:'Crescita solida, inflazione sotto controllo. Mercati in rialzo, bassa volatilità. Favorisce azionario globale e high yield.'},
  reflazione:{col:'#B8860B',nome:'Reflazione',desc:'Crescita in ripresa con inflazione in risalita. Commodities e EM outperformano. Azionario volatile ma positivo.'},
  stagflazione:{col:'#8B1A1A',nome:'Stagflazione',desc:'Crescita debole con inflazione alta. Scenario peggiore per mercati finanziari. Favorisce oro, energia e monetario.'},
  risk_off:{col:'#6B1A1A',nome:'Risk-Off',desc:'Avversione al rischio elevata. Capitali verso bund e oro. Azionario ed EM fortemente penalizzati.'},
  neutro:{col:'#4B5563',nome:'Neutro',desc:'Segnali contrastanti. Regime di transizione. Portafoglio bilanciato senza sovrapesi direzionali.'},
};
const LIVELLI_NOMI={
  C1:'Monetario Cedola',C2:'Monetario+ Cedola',C3:'Conservativo Cedola',
  C4:'Moderato Cedola',C5:'Bilanciato Cedola',C6:'Bilanciato+ Cedola',
  C7:'Dinamico Cedola',C8:'Azionario+ Cedola',C9:'Trading Cedola',
  A1:'Monetario Acc',A2:'Monetario+ Acc',A3:'Conservativo Acc',
  A4:'Moderato Acc',A5:'Bilanciato Acc',A6:'Bilanciato+ Acc',
  A7:'Dinamico Acc',A8:'Azionario+ Acc',A9:'Trading Acc',
};
const LIVELLI=['C1','C2','C3','C4','C5','C6','C7','C8','C9','A1','A2','A3','A4','A5','A6','A7','A8','A9'];
const GRUPPI={
  conservativo:{livelli:['C1','C2','C3','A1','A2','A3'],col:'#1A6B3A',nome:'Conservativo'},
  bilanciato:{livelli:['C4','C5','C6','A4','A5','A6'],col:'#B8860B',nome:'Bilanciato'},
  aggressivo:{livelli:['C7','C8','C9','A7','A8','A9'],col:'#8B1A1A',nome:'Aggressivo/Trading'},
};

function fmt(n,d=1){return n==null?'—':(n>=0?'+':'')+n.toFixed(d)+'%';}
function fmtE(n){return n==null?'—':'€'+Math.round(n).toLocaleString('it-IT');}

async function loadData(){
  const r=await fetch(BASE+'compass_data.json?t='+Date.now());
  return r.json();
}

async function render(){
  try{
    const data=await loadData();
    const pm=data.portafogli_modello||{};
    const rm=data.regime_macro||{};
    const bm=data.benchmarks||{};
    const ver=data.procedure_version||'—';
    const gen=data.generated?new Date(data.generated).toLocaleString('it-IT'):'—';
    document.getElementById('update-info').textContent='v'+ver+' · '+gen;

    const livelli=Object.keys(pm);
    const capTot=livelli.reduce((s,k)=>s+(pm[k].capitale_attuale||100000),0);
    const perfTot=livelli.reduce((s,k)=>s+(pm[k].performance_totale_eur||0),0);
    const avgPerf=(livelli.reduce((s,k)=>s+(pm[k].performance_totale_pct||0),0)/livelli.length);
    const libroGen=new Date().toLocaleString('it-IT');

    let html='';

    // ── PAG 1: COPERTINA ───────────────────────────────────────────────
    html+=`<div class="cover">
      <div class="cover-eyebrow">Documento di Presentazione · Raptor Wealth Meridian</div>
      <div class="cover-title">COMPASS<br><em>Wealth Management</em></div>
      <div class="cover-sub">Sistema di Gestione Patrimoniale Adattivo</div>
      <div class="cover-tag">18 PORTAFOGLI MODELLO · BACKTEST JAN 2025 → OGGI</div>
      <div class="cover-stats">
        <div class="cstat"><span class="cstat-val">18</span><span class="cstat-label">Portafogli</span></div>
        <div class="cstat"><span class="cstat-val">${fmtE(capTot)}</span><span class="cstat-label">Capitale totale</span></div>
        <div class="cstat"><span class="cstat-val" style="color:var(--green)">${perfTot>=0?'+':''}${fmtE(Math.abs(perfTot))}</span><span class="cstat-label">Performance totale</span></div>
        <div class="cstat"><span class="cstat-val">${avgPerf.toFixed(1)}%</span><span class="cstat-label">Media portafogli</span></div>
      </div>
      <div class="cover-footer">Procedura v${ver} · ${gen}</div>
    </div>`;

    // ── PAG 2: IL METODO ──────────────────────────────────────────────
    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Il Metodo</div>
        <h2 class="section-h2">Come Funziona COMPASS</h2>
      </div>
      <div class="method-grid">
        <div class="method-card">
          <h4>1. Legge il Mercato</h4>
          <p>Ogni notte analizza 15 ETF proxy USA (azionario, obbligazionario, oro, volatilità, dollaro) per classificare il regime macro corrente tra 5 scenari possibili.</p>
        </div>
        <div class="method-card">
          <h4>2. Seleziona gli ETF</h4>
          <p>Per ogni portafoglio, sceglie gli ETF migliori tra un pool predefinito usando uno score (0-100) basato su trend, momentum e rendimento da cedola.</p>
        </div>
        <div class="method-card">
          <h4>3. Si Adatta</h4>
          <p>Se il mercato cambia scenario o un ETF perde terreno, il sistema ribilancia automaticamente il portafoglio con nuovi ETF più adatti al contesto.</p>
        </div>
      </div>
      <div class="section-head" style="margin-top:32px">
        <div class="section-eyebrow">I 5 Scenari Macro</div>
      </div>
      <div class="scenari-grid">
        ${Object.entries(SCENARI_INFO).map(([k,s])=>`
          <div class="scenario-card" style="border-top:3px solid ${s.col}">
            <div class="scenario-name" style="color:${s.col}">${s.nome}</div>
            <div class="scenario-desc">${s.desc}</div>
          </div>`).join('')}
      </div>
      <div style="background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.3);padding:16px 20px;border-radius:3px">
        <div style="font-size:8px;letter-spacing:3px;color:var(--gold3);margin-bottom:8px">REGIME CORRENTE</div>
        <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:600;color:${SCENARI_INFO[rm.scenario]?.col||'var(--text)'}">
          ${(rm.scenario||'—').toUpperCase()} — ${rm.confidence||'—'}% confidence
        </div>
        <div style="font-size:10px;color:var(--text2);margin-top:6px">${SCENARI_INFO[rm.scenario]?.desc||''}</div>
      </div>
    </div>`;

    // ── PAG 3: RISULTATI ──────────────────────────────────────────────
    const sorted=[...LIVELLI].sort((a,b)=>(pm[b]?.performance_totale_pct||0)-(pm[a]?.performance_totale_pct||0));
    const maxP=pm[sorted[0]]?.performance_totale_pct||1;

    const rankRows=sorted.map((lid,i)=>{
      const p=pm[lid]||{};
      const perf=p.performance_totale_pct||0;
      const vol=p.volatilita_ann;
      const mdd=p.max_drawdown;
      const sh=p.sharpe;
      const posC=i===0?'#B8860B':i===1?'#888':i===2?'#CD7F32':'var(--text2)';
      const pC=perf>=0?'var(--green)':'var(--red)';
      const barW=Math.abs(perf)/Math.abs(maxP)*120;
      const barC=perf>=0?'var(--green)':'var(--red)';
      return `<tr>
        <td style="font-family:'Playfair Display',serif;font-size:18px;color:${posC}">${i+1}</td>
        <td style="font-weight:600;color:${lid.startsWith('C')?'var(--blue)':'var(--green)'}">${lid}</td>
        <td style="color:var(--text2)">${LIVELLI_NOMI[lid]||'—'}</td>
        <td>
          <div style="display:flex;align-items:center;gap:8px">
            <div style="width:${barW}px;height:4px;background:${barC};border-radius:2px;min-width:4px"></div>
            <span style="font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:${pC}">${fmt(perf)}</span>
          </div>
        </td>
        <td style="color:${vol>20?'var(--red)':vol>12?'#B8860B':'var(--green)'}">${vol!=null?vol.toFixed(1)+'%':'—'}</td>
        <td style="color:var(--red)">${mdd!=null?mdd.toFixed(1)+'%':'—'}</td>
        <td style="color:${sh>1.5?'var(--green)':sh>0.8?'#B8860B':'var(--red)'}">${sh!=null?sh.toFixed(2):'—'}</td>
      </tr>`;
    }).join('');

    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Risultati</div>
        <h2 class="section-h2">Performance Jan 2025 → Oggi</h2>
      </div>
      <table class="rank-table" style="margin-bottom:24px;font-size:10px">
        <thead><tr>
          <th style="width:140px">Portafoglio</th>
          <th style="text-align:right">Rendimento</th>
          <th>Benchmark principale</th>
          <th style="text-align:right">Outperf.</th>
          <th style="text-align:right">SWDA +18%</th>
          <th style="text-align:right">IWMO +27%</th>
        </tr></thead>
        <tbody id="pres-rank-body"></tbody>
      </table>
      <div style="position:relative;height:380px;background:#0A1628;border-radius:4px;padding:8px">
        <canvas id="pres-scatter" height="364" style="width:100%;display:block" aria-label="Scatter plot rischio-rendimento"></canvas>
      </div>
      <div style="font-size:9px;color:var(--text2);text-align:center;margin-top:6px">Asse X = Volatilità · Asse Y = Rendimento · Dimensione bolla = |Max Drawdown|</div>
    </div>`;

    // ── PAG 4: HEATMAP ────────────────────────────────────────────────
    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Rendimenti Mensili</div>
        <h2 class="section-h2">Heatmap Gen 2025 → Oggi</h2>
      </div>
      <div id="pres-heatmap" style="overflow-x:auto;margin-bottom:20px"></div>
      <div style="background:var(--paper2);border-left:3px solid var(--gold);padding:14px 18px">
        <div style="font-size:8px;letter-spacing:3px;color:var(--gold3);margin-bottom:8px">COMMENTO AL PERIODO</div>
        <div style="font-size:10px;color:var(--text2);line-height:1.9">
          Il periodo gennaio 2025 → maggio 2026 è stato caratterizzato da un prolungato regime <strong>goldilocks</strong> (gen-ago 2025) con mercati azionari in forte rialzo, seguito da una fase <strong>neutro</strong> (set-nov 2025) di consolidamento. Il <strong>crollo dei dazi Trump</strong> di aprile 2026 ha generato un regime <strong>risk-off</strong> con drawdown significativi sui portafogli aggressivi, recuperato rapidamente nel maggio 2026 con il passaggio a <strong>reflazione</strong>. I portafogli conservativi hanno mostrato la loro capacità di protezione nella fase risk-off.
        </div>
      </div>
    </div>`;

    // ── PAG 5: PROFILI ────────────────────────────────────────────────
    const profiloHTML=Object.entries(GRUPPI).map(([gk,g])=>{
      const lids=g.livelli;
      const avgRend=(lids.reduce((s,l)=>s+(pm[l]?.performance_totale_pct||0),0)/lids.length);
      const avgVol=(lids.reduce((s,l)=>s+(pm[l]?.volatilita_ann||0),0)/lids.length);
      const avgMdd=(lids.reduce((s,l)=>s+(pm[l]?.max_drawdown||0),0)/lids.length);
      const avgSh=(lids.reduce((s,l)=>s+(pm[l]?.sharpe||0),0)/lids.length);
      const bm1=g.livelli[0].startsWith('C')||true;
      const bmKey=gk==='conservativo'?'MACV.MI':gk==='bilanciato'?'MODR.MI':'MAGR.MI';
      const bmPerf=bm?.[bmKey]?.perf_pct;
      const outperf=bmPerf!=null?avgRend-bmPerf:null;
      return `<div class="profilo-card">
        <div class="profilo-header" style="background:${g.col}">
          <div style="font-family:'Playfair Display',serif;font-size:18px;font-weight:600">${g.nome}</div>
          <div style="font-size:9px;opacity:0.8;margin-top:2px">${lids.join(' · ')}</div>
        </div>
        <div class="profilo-body">
          <div class="profilo-kpi"><span>Rendimento medio</span><strong style="color:${avgRend>=0?'var(--green)':'var(--red)'}">${fmt(avgRend)}</strong></div>
          <div class="profilo-kpi"><span>Volatilità media</span><strong>${avgVol.toFixed(1)}%</strong></div>
          <div class="profilo-kpi"><span>Max Drawdown medio</span><strong style="color:var(--red)">${avgMdd.toFixed(1)}%</strong></div>
          <div class="profilo-kpi"><span>Sharpe medio</span><strong>${avgSh.toFixed(2)}</strong></div>
          ${outperf!=null?`<div class="profilo-kpi"><span>vs Benchmark</span><strong style="color:${outperf>=0?'var(--green)':'var(--red)'}">${fmt(outperf)} pp</strong></div>`:''}
        </div>
      </div>`;
    }).join('');

    const bmRows=[
      {n:'iShares Conservative',t:'MACV.MI',desc:'40% az / 60% obbl'},
      {n:'iShares Moderate',t:'MODR.MI',desc:'60% az / 40% obbl'},
      {n:'iShares Aggressive',t:'MAGR.MI',desc:'80% az / 20% obbl'},
      {n:'MSCI World',t:'SWDA.MI',desc:'100% azionario globale'},
      {n:'EUR Aggregate Bond',t:'IEAG.MI',desc:'100% obbligazionario EUR'},
      {n:'MSCI World Momentum',t:'IWMO.MI',desc:'Momentum factor globale'},
    ].map(b=>{
      const p=bm[b.t]?.perf_pct;
      return `<tr>
        <td style="font-weight:500">${b.n}</td>
        <td style="color:var(--blue)">${b.t}</td>
        <td style="color:var(--text2)">${b.desc}</td>
        <td style="font-weight:600;color:${p>=0?'var(--green)':'var(--red)'}">${p!=null?fmt(p,1):'—'}</td>
      </tr>`;
    }).join('');

    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Profili di Rischio</div>
        <h2 class="section-h2">Tre Gruppi — Un Sistema</h2>
      </div>
      <div class="profili-grid">${profiloHTML}</div>
      <div class="section-head" style="margin-top:32px">
        <div class="section-eyebrow">Confronto Benchmark</div>
      </div>
      <table class="rank-table">
        <thead><tr><th>Benchmark</th><th>Ticker</th><th>Composizione</th><th>Rendimento Jan25→oggi</th></tr></thead>
        <tbody>${bmRows}</tbody>
      </table>
    </div>`;

    // ── PAG 6: COME CALCOLIAMO ────────────────────────────────────────
    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Trasparenza</div>
        <h2 class="section-h2">Come Calcoliamo le Metriche</h2>
      </div>
      <div class="formula-block">
        <div class="formula-title">📈 Rendimento Totale (Total Return)</div>
        <div class="formula-code">Total Return = (Prezzo Finale − Prezzo Iniziale) / Prezzo Iniziale × 100
             + Yield Annuo / 365 × Giorni Detenuti</div>
        <div class="formula-desc">Non è solo la variazione di prezzo — include le cedole distribuite pro-rata sui giorni di detenzione. Per i portafogli: somma ponderata del total return di ogni ETF per il suo peso.</div>
      </div>
      <div class="formula-block">
        <div class="formula-title">📊 Volatilità Annualizzata</div>
        <div class="formula-code">1. Rendimento giornaliero:  r(t) = (V(t) − V(t−1)) / V(t−1)
2. Deviazione standard:     σ_daily = std(r)
3. Annualizzazione:         Volatilità = σ_daily × √252</div>
        <div class="formula-desc">Misura quanto oscilla il valore del portafoglio ogni anno. Un portafoglio con volatilità 15% può oscillare di ±15% in un anno tipico. Verde &lt;12% · Giallo 12-20% · Rosso &gt;20%.</div>
      </div>
      <div class="formula-block">
        <div class="formula-title">📉 Max Drawdown</div>
        <div class="formula-code">1. Per ogni giorno: Peak(t) = max(V(0)...V(t))
2. Drawdown(t) = (V(t) − Peak(t)) / Peak(t) × 100
3. Max Drawdown = min(Drawdown(t))</div>
        <div class="formula-desc">La peggiore perdita dal picco durante il periodo. Es. −22% significa che il portafoglio ha perso al massimo il 22% dal suo massimo storico prima di recuperare.</div>
      </div>
      <div class="formula-block">
        <div class="formula-title">⚡ Sharpe Ratio</div>
        <div class="formula-code">rf_daily = 3% / 252   (tasso BCE risk-free)
Sharpe = (μ_daily − rf_daily) / σ_daily × √252</div>
        <div class="formula-desc">Rendimento aggiustato per il rischio. Risponde alla domanda: "quanto rendimento sto ottenendo per ogni unità di rischio?". Sharpe &gt;1.5 = eccellente · 0.8-1.5 = buono · &lt;0.8 = scarso.</div>
      </div>
      <div class="formula-block">
        <div class="formula-title">💛 Cedola Stimata (solo portafogli Distribuzione)</div>
        <div class="formula-code">Cedola annua lorda = Σ (Importo_ETF × Yield_ETF%)
Cedola annua netta = Cedola lorda × (1 − 26%)
Cedola incassata  = Cedola annua × Giorni / 365</div>
        <div class="formula-desc">La tassazione del 26% si applica ai dividendi distribuiti da ETF non armonizzati o su plusvalenze. I rendimenti indicati sono lordi salvo indicazione "netti". Consultare il proprio consulente fiscale per la situazione specifica.</div>
      </div>
    </div>`;

    // ── PAG 7: DISCLAIMER ─────────────────────────────────────────────
    html+=`<div class="page">
      <div class="section-head">
        <div class="section-eyebrow">Note Legali</div>
        <h2 class="section-h2">Avvertenze e Disclaimer</h2>
      </div>
      <div class="disclaimer">
        <p style="margin-bottom:12px"><strong>Il presente documento ha finalità esclusivamente informative e di presentazione.</strong> Non costituisce offerta, sollecitazione, raccomandazione o consulenza in materia di investimenti ai sensi del D.Lgs. 58/1998 (TUF) e della Direttiva MiFID II.</p>
        <p style="margin-bottom:12px">I rendimenti storici illustrati si riferiscono a un <strong>backtest simulato</strong> effettuato su dati reali di mercato (fonte: Yahoo Finance) per il periodo gennaio 2025 – oggi. I rendimenti passati non sono indicativi di quelli futuri. Il backtest è soggetto a bias tipici delle simulazioni retrospettive (survivorship bias, look-ahead bias).</p>
        <p style="margin-bottom:12px">I portafogli modello COMPASS sono costrutti teorici con capitale iniziale di €100.000 per livello. Non rappresentano portafogli reali di clienti. Le metriche di rischio (volatilità, max drawdown, Sharpe) sono calcolate sulla serie storica simulata e potrebbero differire significativamente da risultati reali.</p>
        <p style="margin-bottom:12px">Gli ETF citati sono strumenti finanziari soggetti a rischi di mercato, di credito, di liquidità e di cambio. Prima di qualsiasi investimento è necessaria un'analisi del proprio profilo di rischio, orizzonte temporale e obiettivi finanziari.</p>
        <p style="margin-bottom:12px">La cedola stimata è calcolata sulla base dei dividend yield dichiarati dagli ETF e può variare significativamente. La tassazione del 26% è indicativa e può variare in base alla normativa fiscale applicabile e alla situazione specifica dell'investitore.</p>
        <p><strong>Raptor Wealth Meridian</strong> · Documento generato automaticamente · Procedura v${ver}<br>
        Data generazione: ${libroGen} · Dati aggiornati al: ${gen}</p>
      </div>
    </div>`;

    document.getElementById('loading').style.display='none';
    const cont=document.getElementById('content');
    cont.innerHTML=html;
    cont.style.display='block';

    setTimeout(()=>{
      renderPresScatter(pm);
      renderPresHeatmap(pm);
      renderPresBenchmark(pm, bm);
    },150);

  }catch(e){
    document.getElementById('loading').innerHTML='<div style="color:var(--red)">Errore: '+e.message+'</div>';
  }
}

function renderPresBenchmark(pm, bm){
  const tbody = document.getElementById('pres-rank-body');
  if(!tbody) return;

  const BM_LABEL = {
    'XEON.MI':'XEON (overnight)',
    'IEAG.MI':'IEAG (bond EUR)',
    'V20A.DE':'LifeStrategy 20%',
    'V40A.DE':'LifeStrategy 40%',
    'V60A.DE':'LifeStrategy 60%',
    'V80A.DE':'LifeStrategy 80%',
    'MACV.MI':'MACV (conserv.)',
    'MODR.MI':'MODR (moder.)',
    'MAGR.MI':'MAGR (aggress.)',
  };

  const BM_PER_LIVELLO = {
    C1:'XEON.MI',C2:'IEAG.MI',C3:'V20A.DE',C4:'V40A.DE',C5:'V60A.DE',
    C6:'V80A.DE',C7:'MAGR.MI',C8:'MAGR.MI',C9:'MAGR.MI',
    A1:'XEON.MI',A2:'IEAG.MI',A3:'V20A.DE',A4:'V40A.DE',A5:'V60A.DE',
    A6:'V80A.DE',A7:'MAGR.MI',A8:'MAGR.MI',A9:'MAGR.MI',
  };

  const SWDA_PERF = bm['SWDA.MI']?.perf_pct;
  const IWMO_PERF = bm['IWMO.MI']?.perf_pct;

  // Ordina per rendimento decrescente
  const sorted = LIVELLI.slice().sort((a,b)=>
    (pm[b]?.performance_totale_pct||0)-(pm[a]?.performance_totale_pct||0));

  let prevGruppo = '';
  sorted.forEach(lid => {
    const p = pm[lid]||{};
    const perf = p.performance_totale_pct||0;
    const bmKey = BM_PER_LIVELLO[lid];
    const bmPerf = bm[bmKey]?.perf_pct;
    const bmLabel = BM_LABEL[bmKey]||bmKey;
    const diff = bmPerf!=null ? perf - bmPerf : null;
    const isC = lid.startsWith('C');
    const gruppo = isC ? 'C' : 'A';
    const isNewGruppo = gruppo !== prevGruppo;
    prevGruppo = gruppo;

    const idCol = isC ? '#185FA5' : '#0F6E56';
    const perfCol = perf >= 0 ? '#1A6B3A' : '#8B1A1A';

    function pill(d) {
      if(d==null) return '—';
      const col = d>=0?'#1A6B3A':'#8B1A1A';
      const bg  = d>=0?'#EAF3DE':'#FCEBEB';
      return `<span style="background:${bg};color:${col};padding:2px 6px;border-radius:3px;font-size:9px;font-weight:500">${d>=0?'+':''}${d.toFixed(1)}pp</span>`;
    }

    const tr = document.createElement('tr');
    tr.style.cssText = isNewGruppo
      ? 'border-top:2px solid #D4CDB8'
      : 'border-top:1px solid var(--border)';

    tr.innerHTML = `
      <td style="padding:6px 10px">
        <span style="font-weight:600;color:${idCol};margin-right:5px">${lid}</span>
        <span style="color:var(--text2);font-size:9px">${LIVELLI_NOMI[lid]||''}</span>
      </td>
      <td style="padding:6px 10px;text-align:right;font-weight:600;color:${perfCol}">${perf>=0?'+':''}${perf.toFixed(1)}%</td>
      <td style="padding:6px 10px">
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:60px;height:5px;background:#EDE8DF;border-radius:3px;overflow:hidden">
            <div style="width:${Math.min(100,Math.abs(diff||0)/30*100)}%;height:100%;background:${(diff||0)>=0?'#639922':'#E24B4A'};border-radius:3px"></div>
          </div>
          <span style="font-size:9px;color:var(--text2)">${bmLabel}</span>
          ${bmPerf!=null?`<span style="font-size:9px;color:var(--text2)">${bmPerf>=0?'+':''}${bmPerf.toFixed(1)}%</span>`:''}
        </div>
      </td>
      <td style="padding:6px 10px;text-align:right">${pill(diff)}</td>
      <td style="padding:6px 10px;text-align:right">${pill(SWDA_PERF!=null?perf-SWDA_PERF:null)}</td>
      <td style="padding:6px 10px;text-align:right">${pill(IWMO_PERF!=null?perf-IWMO_PERF:null)}</td>
    `;
    tbody.appendChild(tr);
  });
}

function renderPresScatter(pm){
  const canvas=document.getElementById('pres-scatter');
  if(!canvas)return;
  canvas.width=canvas.offsetWidth||940; canvas.height=364;
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=364,P={t:16,r:80,b:36,l:66};
  const w=W-P.l-P.r,h=H-P.t-P.b;

  const pts=LIVELLI.map(lid=>{
    const p=pm[lid]||{};
    return{lid,perf:p.performance_totale_pct||0,vol:p.volatilita_ann||0,mdd:Math.abs(p.max_drawdown||5),isC:lid.startsWith('C')};
  }).filter(p=>p.vol>0);

  const maxVol=Math.max(...pts.map(p=>p.vol))*1.12||32;
  const maxPerf=Math.max(...pts.map(p=>p.perf))*1.12||72;
  const maxMdd=Math.max(...pts.map(p=>p.mdd))||25;
  const xS=v=>P.l+(v/maxVol)*w;
  const yS=v=>P.t+h-(v/maxPerf)*h;

  ctx.fillStyle='#0A1628';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
  [0,.25,.5,.75,1].forEach(t=>{
    const y=P.t+h*t;ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(P.l+w,y);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='8px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText((maxPerf*(1-t)).toFixed(0)+'%',P.l-4,y+3);
    const x=P.l+w*t;ctx.beginPath();ctx.moveTo(x,P.t);ctx.lineTo(x,P.t+h);ctx.stroke();
    ctx.textAlign='center';ctx.fillText((maxVol*t).toFixed(0)+'%',x,P.t+h+14);
  });

  pts.forEach(p=>{
    const x=xS(p.vol),y=yS(p.perf);
    const r=Math.max(20,(p.mdd/maxMdd)*42);
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=p.isC?'rgba(24,95,165,0.72)':'rgba(15,110,86,0.72)';ctx.fill();
    ctx.strokeStyle=p.isC?'rgba(96,165,250,0.9)':'rgba(52,211,153,0.9)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font=`bold ${r>24?13:10}px DM Mono,monospace`;
    ctx.fillStyle='rgba(255,255,255,0.97)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.lid,x,y);
  });

  // Legenda
  [['Cedola (C)','rgba(24,95,165,0.72)','rgba(96,165,250,0.9)'],
   ['Accumulazione (A)','rgba(15,110,86,0.72)','rgba(52,211,153,0.9)']].forEach(([lbl,fill,stroke],i)=>{
    const lx=P.l+w-140,ly=P.t+16+i*20;
    ctx.beginPath();ctx.arc(lx,ly,7,0,Math.PI*2);
    ctx.fillStyle=fill;ctx.fill();ctx.strokeStyle=stroke;ctx.lineWidth=1.2;ctx.stroke();
    ctx.font='9px DM Mono,monospace';ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(lbl,lx+12,ly);
  });
}

function renderPresHeatmap(pm){
  const wrap=document.getElementById('pres-heatmap');
  if(!wrap)return;
  const allMesi=new Set();
  LIVELLI.forEach(lid=>Object.keys(pm[lid]?.rendimenti_mensili||{}).forEach(m=>allMesi.add(m)));
  const mesiSorted=[...allMesi].sort();
  const mesiLabel=mesiSorted.map(m=>{
    const[y,mo]=m.split('-');
    const n=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    return n[+mo]+' '+y.slice(2);
  });

  function hC(v){
    if(v==null||Math.abs(v)<0.15)return '#EDE8DF';
    if(v>0)return v>8?'#173404':v>5?'#27500A':v>3?'#3B6D11':v>1.5?'#639922':'#C0DD97';
    return v<-8?'#501313':v<-5?'#791F1F':v<-3?'#A32D2D':v<-1.5?'#E24B4A':'#F7C1C1';
  }
  function hT(v){
    if(v==null||Math.abs(v)<0.15)return '#9B9580';
    return Math.abs(v)>3?'rgba(255,255,255,0.95)':'rgba(0,0,0,0.7)';
  }

  const cW=36,cH=24,lblW=38,totW=50;
  let h=`<div style="display:grid;grid-template-columns:${lblW}px repeat(${mesiSorted.length},${cW}px) ${totW}px;gap:2px;font-family:'DM Mono',monospace">`;
  h+=`<div style="height:34px"></div>`;
  mesiLabel.forEach(m=>{
    h+=`<div style="height:34px;display:flex;align-items:center;justify-content:center">
      <span style="font-size:7.5px;font-weight:500;color:var(--text2);writing-mode:vertical-lr;transform:rotate(180deg)">${m}</span>
    </div>`;
  });
  h+=`<div style="height:34px;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;font-weight:600;color:var(--text)">TOT</span></div>`;

  LIVELLI.forEach(lid=>{
    if(lid==='A1')h+=`<div style="grid-column:1/-1;height:5px"></div>`;
    const p=pm[lid]||{};const rm=p.rendimenti_mensili||{};
    const isC=lid.startsWith('C');
    h+=`<div style="height:${cH}px;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;font-size:10px;font-weight:600;color:${isC?'var(--blue)':'var(--green)'}">${lid}</div>`;
    let cum=1;
    mesiSorted.forEach(m=>{
      const v=rm[m]??null;
      if(v!=null)cum*=(1+v/100);
      const bg=hC(v),tc=hT(v);
      const lbl=v!=null&&Math.abs(v)>=0.5?(v>0?'+':'')+v.toFixed(1):'';
      h+=`<div title="${lid} ${m}: ${v!=null?(v>0?'+':'')+v.toFixed(2)+'%':'—'}" style="height:${cH}px;background:${bg};border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;color:${tc}">${lbl}</div>`;
    });
    const tot=(cum-1)*100;
    h+=`<div style="height:${cH}px;background:${hC(tot)};border-radius:2px;border:1.5px solid rgba(0,0,0,0.12);display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${hT(tot)}">${tot>=0?'+':''}${tot.toFixed(1)}%</div>`;
  });
  h+='</div>';
  wrap.innerHTML=h;
}

render();
</script>
