<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — Wealth Management</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0A1628;--navy2:#122040;--gold:#C9A84C;--gold2:#E8C96A;
  --bg:#F5F3EE;--text:#1A1A2A;--text2:#6B7280;--border:#E2DDD6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Mono',monospace;background:var(--navy);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(201,168,76,.08) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(201,168,76,.05) 0%,transparent 50%);}
.wrap{max-width:420px;width:100%;text-align:center;position:relative;z-index:1;}
.logo{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;}
.brand{font-family:'Fraunces',serif;font-size:28px;font-weight:600;color:#fff;letter-spacing:.05em;margin-bottom:4px;}
.brand-sub{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;}
.tagline{font-family:'Fraunces',serif;font-size:14px;font-weight:300;font-style:italic;color:rgba(255,255,255,.45);margin-bottom:36px;line-height:1.7;}
.btn{display:block;padding:14px 28px;border-radius:50px;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;transition:all .2s;margin-bottom:10px;text-decoration:none;cursor:pointer;border:none;font-family:'DM Mono',monospace;width:100%;}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);}
.btn-primary:hover{opacity:.88;transform:translateY(-1px);}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);}
.btn-outline:hover{border-color:rgba(255,255,255,.3);color:#fff;}
.divider{height:1px;background:rgba(255,255,255,.06);margin:20px 0;}
.client-input{display:flex;gap:8px;margin-top:16px;}
.client-input input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:11px;padding:10px 14px;border-radius:8px;outline:none;font-family:'DM Mono',monospace;}
.client-input input:focus{border-color:var(--gold);}
.client-input input::placeholder{color:rgba(255,255,255,.25);}
.client-btn{background:var(--gold);color:var(--navy);padding:10px 16px;border-radius:8px;font-size:10px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;font-family:'DM Mono',monospace;}
.ver{font-size:8px;color:rgba(255,255,255,.2);margin-top:24px;letter-spacing:1px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:28px 0;}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:12px;}
.stat-val{font-family:'Fraunces',serif;font-size:20px;color:var(--gold2);margin-bottom:2px;}
.stat-label{font-size:8px;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">🧭</div>
  <div class="brand">COMPASS</div>
  <div class="brand-sub">Wealth Management System</div>
  <div class="tagline">"Orientare il patrimonio verso gli obiettivi che contano"</div>

  <div class="stats">
    <div class="stat"><div class="stat-val">18</div><div class="stat-label">Profili</div></div>
    <div class="stat"><div class="stat-val">104</div><div class="stat-label">ETF</div></div>
    <div class="stat"><div class="stat-val">RAPTOR</div><div class="stat-label">Segnali</div></div>
  </div>

  <a class="btn btn-primary" href="advisor.html">🦅 Accesso Advisor</a>
  <a class="btn btn-outline" href="https://giorgiogoldoni.github.io/trader/">← RAPTOR Hub</a>

  <div class="divider"></div>

  <div style="font-size:9px;color:rgba(255,255,255,.25);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px">Portale Cliente</div>
  <div class="client-input">
    <input type="text" id="client-id" placeholder="Il tuo codice (es. ClienteC5)">
    <button class="client-btn" onclick="goClient()">Accedi →</button>
  </div>

  <div class="ver">COMPASS v1.0 · RAPTOR WEALTH MERIDIAN · Giorgio Goldoni · 2026</div>
</div>

<script>
function goClient(){
  const id = document.getElementById('client-id').value.trim();
  if(!id){ alert('Inserisci il tuo codice cliente'); return; }
  window.location.href = 'client.html?id='+encodeURIComponent(id);
}
document.getElementById('client-id').addEventListener('keydown',e=>{
  if(e.key==='Enter') goClient();
});
</script>
</body>
</html>
