<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — Libro dei Portafogli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold2: #E8C96A;
  --gold3: #8B6914;
  --ink: #0D0D1A;
  --ink2: #1A1A2E;
  --paper: #F7F4EE;
  --paper2: #EDE8DF;
  --text: #1A1828;
  --text2: #6B6580;
  --green: #1A6B3A;
  --red: #8B1A1A;
  --blue: #1A3A6B;
  --border: #D4CDB8;
  --shadow: rgba(0,0,0,0.08);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Mono', monospace;
  background: var(--paper);
  color: var(--text);
  font-size: 11px;
  line-height: 1.7;
}

/* TOOLBAR */
.toolbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  background: var(--ink);
  border-bottom: 1px solid var(--gold3);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  height: 52px;
}

.toolbar-brand {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 1px;
}

.toolbar-brand span { color: rgba(255,255,255,0.4); font-size: 10px; margin-left: 8px; font-family: 'DM Mono'; }

.toolbar-actions { display: flex; gap: 10px; align-items: center; }

.btn-print {
  background: var(--gold);
  color: var(--ink);
  border: none;
  padding: 8px 18px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn-print:hover { background: var(--gold2); }

.btn-outline-light {
  background: transparent;
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 7px 14px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-block;
}
.btn-outline-light:hover { border-color: var(--gold); color: var(--gold); }

#update-info { font-size: 9px; color: rgba(255,255,255,0.3); letter-spacing: 1px; }

/* MAIN CONTENT */
.book {
  max-width: 1100px;
  margin: 72px auto 60px;
  padding: 0 32px;
}

/* COVER */
.cover {
  min-height: 60vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 80px 0 60px;
  border-bottom: 2px solid var(--gold);
  margin-bottom: 60px;
  position: relative;
}

.cover::after {
  content: 'RAPTOR WEALTH MERIDIAN';
  position: absolute;
  top: 40px; right: 0;
  font-size: 8px;
  letter-spacing: 4px;
  color: var(--text2);
}

.cover-eyebrow {
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--gold3);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.cover-title {
  font-family: 'Playfair Display', serif;
  font-size: 56px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.1;
  margin-bottom: 8px;
}

.cover-title em { color: var(--gold3); font-style: italic; }

.cover-subtitle {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--text2);
  font-style: italic;
  margin-bottom: 48px;
}

.cover-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
  max-width: 700px;
}

.cstat {
  border-top: 2px solid var(--gold);
  padding-top: 12px;
}

.cstat-val {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--ink);
  display: block;
}

.cstat-label {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
  display: block;
  margin-top: 2px;
}

/* REGIME PANEL */
.regime-section {
  background: var(--ink);
  color: white;
  padding: 40px 48px;
  margin-bottom: 60px;
  border-left: 4px solid var(--gold);
  position: relative;
  overflow: hidden;
}

.regime-section::before {
  content: '';
  position: absolute;
  top: 0; right: 0;
  width: 300px; height: 100%;
  background: radial-gradient(ellipse at right, rgba(201,168,76,0.06) 0%, transparent 70%);
}

.regime-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 32px;
}

.regime-label {
  font-size: 8px;
  letter-spacing: 4px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.regime-scenario {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--gold);
}

.regime-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 40px;
}

.regime-block-title {
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.score-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}

.score-bar-label {
  width: 90px;
  font-size: 9px;
  color: rgba(255,255,255,0.5);
  text-align: right;
  flex-shrink: 0;
}

.score-bar-track {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
}

.score-bar-fill { height: 100%; border-radius: 3px; }
.score-bar-val { font-size: 9px; color: rgba(255,255,255,0.6); width: 32px; text-align: right; }

.geo-row { display: flex; gap: 20px; }
.geo-item { flex: 1; }
.geo-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
}
.geo-label { font-size: 8px; color: rgba(255,255,255,0.4); letter-spacing: 2px; text-transform: uppercase; }

.peso-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.peso-chip {
  padding: 4px 10px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 2px;
  font-size: 9px;
  color: rgba(255,255,255,0.7);
}
.peso-chip.over { border-color: rgba(201,168,76,0.4); color: var(--gold); }
.peso-chip.under { border-color: rgba(139,26,26,0.4); color: #CD5C5C; }

/* SOMMARIO */
.section-break {
  border: none;
  border-top: 1px solid var(--border);
  margin: 40px 0;
}

.section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.section-eyebrow {
  font-size: 8px;
  letter-spacing: 4px;
  color: var(--gold3);
  text-transform: uppercase;
}

.section-title-h2 {
  font-family: 'Playfair Display', serif;
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
}

/* RANKING TABLE */
.ranking-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 48px;
}

.ranking-table th {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
  padding: 8px 12px;
  border-bottom: 2px solid var(--ink);
  text-align: left;
  background: var(--paper2);
}

.ranking-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}

.ranking-table tr:hover td { background: rgba(201,168,76,0.03); }

.rank-pos {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--text2);
  width: 32px;
}
.rank-pos.gold { color: #B8860B; }
.rank-pos.silver { color: #888; }
.rank-pos.bronze { color: #CD7F32; }

.rank-id {
  font-weight: 500;
  color: var(--blue);
  font-size: 12px;
  letter-spacing: 0.5px;
}

.rank-nome { color: var(--text2); font-size: 10px; }

.perf-num {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 600;
}
.perf-pos { color: var(--green); }
.perf-neg { color: var(--red); }

.eur-num { font-size: 11px; color: var(--text2); }

.perf-bar-wrap {
  width: 120px;
  height: 5px;
  background: var(--paper2);
  border-radius: 2px;
  overflow: hidden;
  display: inline-block;
  vertical-align: middle;
}
.perf-bar { height: 100%; border-radius: 2px; }

/* LEVEL CARDS */
.levels-section { margin-bottom: 60px; }

.level-group-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-style: italic;
  color: var(--text2);
  margin-bottom: 24px;
  padding-left: 20px;
  border-left: 3px solid var(--gold);
}

.level-card {
  background: white;
  border: 1px solid var(--border);
  margin-bottom: 32px;
  box-shadow: 0 2px 8px var(--shadow);
  page-break-inside: avoid;
}

.level-card-header {
  display: flex;
  align-items: stretch;
  border-bottom: 1px solid var(--border);
}

.level-stripe {
  width: 6px;
  flex-shrink: 0;
}

.level-header-content {
  flex: 1;
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.level-id-large {
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 700;
  line-height: 1;
  margin-right: 16px;
}

.level-meta { flex: 1; }

.level-nome {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 2px;
}

.level-tipo {
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
}

.level-kpis {
  display: flex;
  gap: 28px;
}

.lkpi { text-align: right; }
.lkpi-label { font-size: 7px; letter-spacing: 1px; color: var(--text2); text-transform: uppercase; margin-bottom: 2px; }
.lkpi-val {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 600;
}

.level-card-body { padding: 20px 24px; }

/* ETF TABLE */
.etf-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
  font-size: 10px;
}

.etf-table thead tr { background: var(--paper2); }

.etf-table th {
  font-size: 7px;
  letter-spacing: 2px;
  color: var(--text2);
  text-transform: uppercase;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  text-align: left;
  white-space: nowrap;
}

.etf-table td {
  padding: 7px 10px;
  border-bottom: 1px solid rgba(0,0,0,0.04);
  vertical-align: middle;
}

.etf-table tr:last-child td { border-bottom: none; }

.etf-table .tk { font-weight: 500; color: var(--blue); font-size: 11px; }
.etf-table .nm { color: var(--text2); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.etf-table .pos { color: var(--green); font-weight: 500; }
.etf-table .neg { color: var(--red); font-weight: 500; }
.etf-table .wt { font-weight: 500; }

.dist-row { background: rgba(201,168,76,0.04); }
.acc-row { background: rgba(29,58,107,0.03); }

.section-label-row td {
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 8px 10px 4px;
  font-weight: 500;
  border-bottom: none;
}

.cedola-row td {
  background: rgba(201,168,76,0.08);
  font-weight: 500;
  color: var(--gold3);
  border-top: 1px solid rgba(201,168,76,0.3);
}

/* COMMENTO */
.commento {
  background: var(--paper2);
  border-left: 3px solid var(--gold);
  padding: 14px 18px;
  margin-top: 16px;
}

.commento-eyebrow {
  font-size: 7px;
  letter-spacing: 3px;
  color: var(--gold3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.commento-text {
  color: var(--text);
  line-height: 1.8;
  font-size: 10.5px;
}

/* ALERT BOXES */
.alerts-section { margin-top: 14px; }

.alert-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 12px;
  background: rgba(139,26,26,0.04);
  border: 1px solid rgba(139,26,26,0.15);
  margin-bottom: 6px;
  font-size: 10px;
}

.alert-icon { color: var(--red); flex-shrink: 0; }
.alert-ticker { font-weight: 500; color: var(--red); }
.alert-desc { color: var(--text2); }

/* FOOTER */
.book-footer {
  text-align: center;
  padding: 40px 0;
  border-top: 1px solid var(--border);
  color: var(--text2);
  font-size: 9px;
  letter-spacing: 1px;
}

/* BENCHMARK */
.benchmark-section {
  display: flex;
  gap: 12px;
  margin: 14px 0;
  flex-wrap: wrap;
}
.bm-card {
  flex: 1;
  min-width: 180px;
  background: var(--paper2);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 12px 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.bm-label { font-size: 7px; letter-spacing: 2px; color: var(--text2); text-transform: uppercase; }
.bm-nome { font-size: 10px; color: var(--text); margin-bottom: 6px; }
.bm-perf { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 600; }
.bm-delta {
  font-size: 10px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 2px;
  display: inline-block;
  margin-top: 4px;
}
.bm-delta.over { background: rgba(26,107,58,0.1); color: var(--green); }
.bm-delta.under { background: rgba(139,26,26,0.1); color: var(--red); }
.bm-delta.neutral { background: rgba(107,101,128,0.1); color: var(--text2); }
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 16px;
  color: var(--text2);
}

.loading-spinner {
  width: 32px; height: 32px;
  border: 2px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* PRINT */
@media print {
  .toolbar { display: none !important; }
  body { background: white; margin: 0; }
  .book { margin-top: 0; padding: 20mm 15mm; max-width: none; }
  .cover { min-height: auto; padding: 20mm 0 15mm; }
  .regime-section { background: #1A1828 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .level-card { box-shadow: none; page-break-inside: avoid; }
  .level-card-header { page-break-inside: avoid; }
  @page { size: A4; margin: 15mm; }
  .level-group-title { page-break-before: always; }
  .level-group-title:first-child { page-break-before: avoid; }
}

/* TOC */
.toc { margin-bottom: 48px; }
.toc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.toc-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  padding: 6px 10px;
  border-bottom: 1px dotted var(--border);
  cursor: pointer;
  transition: background 0.15s;
}
.toc-row:hover { background: var(--paper2); }
.toc-id-small { font-weight: 500; color: var(--blue); width: 32px; flex-shrink: 0; font-size: 11px; }
.toc-nome-small { flex: 1; color: var(--text2); font-size: 10px; }
.toc-perf-small { font-family: 'Playfair Display'; font-size: 14px; font-weight: 600; }
</style>
</head>

function fmt(n,dec=2){ return n==null?'—':(n>=0?'+':'')+n.toFixed(dec)+'%'; }
function fmtE(n){ return n==null?'—':'€'+Math.round(n).toLocaleString('it-IT'); }
function fmtEa(n){ return n==null?'—':'€'+Math.round(Math.abs(n)).toLocaleString('it-IT'); }

async function loadData(){

}

function buildRanking(pm){
  const livelli = Object.keys(pm);
  const sorted = [...livelli].sort((a,b)=>(pm[b].performance_totale_pct||0)-(pm[a].performance_totale_pct||0));
  const maxPerf = pm[sorted[0]].performance_totale_pct||1;

  const rows = sorted.map((lid,i)=>{
    const p = pm[lid];
    const perf = p.performance_totale_pct||0;
    const eur = p.performance_totale_eur||0;
    const posClass = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const perfClass = perf>=0?'perf-pos':'perf-neg';
    const info = LIVELLI_INFO[lid]||{nome:'—',tipo:'—'};
    const barW = Math.abs(perf)/Math.abs(maxPerf)*100;
    const barColor = perf>=0?'#1A6B3A':'#8B1A1A';
    return `<tr>
      <td><span class="rank-pos ${posClass}">${i+1}</span></td>
      <td><span class="rank-id">${lid}</span></td>
      <td><span class="rank-nome">${info.nome}</span></td>
      <td><span class="rank-nome" style="font-size:9px">${info.tipo}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="perf-bar-wrap"><div class="perf-bar" style="width:${barW}%;background:${barColor}"></div></div>
          <span class="perf-num ${perfClass}">${fmt(perf,1)}</span>
        </div>
      </td>
      <td><span class="eur-num ${perf>=0?'pos':'neg'}">${perf>=0?'+':'-'}${fmtEa(eur)}</span></td>
      <td>${fmtE(p.capitale_attuale)}</td>
    </tr>`;
  }).join('');

  return `
  <div class="toc">
    <div class="section-head">
      <span class="section-eyebrow">Ranking</span>
      <h2 class="section-title-h2">Performance Gennaio 2025 → Oggi</h2>
    </div>
    <table class="ranking-table">
      <thead>
        <tr>
          <th>#</th>
          <th>ID</th>
          <th>Portafoglio</th>
          <th>Tipo</th>
          <th colspan="2">Performance</th>
          <th>Capitale Attuale</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function buildBenchmarkSection(lid, ptfData){
  const bm1k = ptfData.benchmark_principale;
  const bm2k = ptfData.benchmark_secondario;
  const op1  = ptfData.outperformance_bm1;
  const op2  = ptfData.outperformance_bm2;
  const ptfPerf = ptfData.performance_totale_pct||0;

  if(!bm1k && !bm2k) return '';

  function bmCard(ticker, outperf, label){
    if(!ticker) return '';
    const bm = (window._benchmarks||{})[ticker]||{};
    const bmPerf = bm.perf_pct;
    const bmNome = bm.nome||ticker;
    const perfStr = bmPerf!=null ? fmt(bmPerf,1) : '—';
    const perfCls = bmPerf!=null ? (bmPerf>=0?'perf-pos':'perf-neg') : '';

    let deltaHTML = '';
    if(outperf!=null){
      const cls = outperf>1?'over':outperf<-1?'under':'neutral';
      const sign = outperf>=0?'+':'';
      deltaHTML = `<div class="bm-delta ${cls}">vs portafoglio: ${sign}${outperf.toFixed(1)}pp</div>`;
    }

    return `<div class="bm-card">
      <div class="bm-label">${label}</div>
      <div class="bm-nome">${bmNome}</div>
      <div class="bm-perf ${perfCls}">${perfStr}</div>
      ${deltaHTML}
    </div>`;
  }

  // Aggiungi sempre SWDA come riferimento universale
  const bm3k = (bm1k!=='SWDA.MI'&&bm2k!=='SWDA.MI') ? 'SWDA.MI' : null;
  const bm3 = bm3k ? (window._benchmarks||{})[bm3k]||{} : null;

  return `
  <div style="font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin:16px 0 8px">
    Confronto Benchmark (01/01/2025 → oggi)
  </div>
  <div class="benchmark-section">
    ${bmCard(bm1k, op1, 'Benchmark Principale')}
    ${bmCard(bm2k, op2, 'Benchmark Secondario')}
    ${bm3k ? `<div class="bm-card">
      <div class="bm-label">Riferimento Universale</div>
      <div class="bm-nome">${bm3.nome||'SWDA.MI'}</div>
      <div class="bm-perf ${(bm3.perf_pct||0)>=0?'perf-pos':'perf-neg'}">${bm3.perf_pct!=null?fmt(bm3.perf_pct,1):'—'}</div>
      ${bm3.perf_pct!=null?`<div class="bm-delta ${ptfPerf-bm3.perf_pct>1?'over':ptfPerf-bm3.perf_pct<-1?'under':'neutral'}">vs portafoglio: ${ptfPerf-bm3.perf_pct>=0?'+':''}${(ptfPerf-bm3.perf_pct).toFixed(1)}pp</div>`:''}
    </div>` : ''}
  </div>`;
}

  const compAttivi = comp.filter(e => (e.peso||0) > 0 || (e.importo||0) > 0);
  const etfDist = compAttivi.filter(e=>{const s=etfData[e.ticker];return s&&(s.tipo==='Dist'||(s.yield_pct||0)>0);});
  const etfAcc  = compAttivi.filter(e=>!etfDist.includes(e));

    const extraCol = showYield
      ? `<td style="color:var(--gold3)">${(sig.yield_pct||0)>0?sig.yield_pct.toFixed(1)+'%':'—'}</td>`
      : `<td class="${p>=0?'pos':'neg'}">${fmt(sig.perf_1a,1)}</td>`;
    return `<tr class="${rowCls}">
      <td class="tk">${e.ticker}</td>
      <td class="nm">${sig.nome||e.nome||'—'}</td>
      <td class="wt">${(e.peso||0).toFixed(1)}%</td>
      <td>${fmtE(e.importo)}</td>
      <td style="font-family:'DM Mono';font-size:9px">€${(e.price_entry||0).toFixed(2)}</td>
      <td style="font-family:'DM Mono';font-size:9px">${e.price_now?'€'+e.price_now.toFixed(2):'—'}</td>
      <td class="${pCls}">${fmt(p,2)}</td>
      ${extraCol}
    </tr>`;
  }

  // Calcola cedola totale
  let cedolaTot = 0;
  if(isDist){
    etfDist.forEach(e=>{
      const sig = etfData[e.ticker]||{};
      if(sig.yield_pct>0) cedolaTot += Math.round(e.importo * sig.yield_pct/100);
    });
  }

  let tableHTML = '';
  if(etfDist.length>0){
    tableHTML += `<tr class="section-label-row"><td colspan="8" style="color:var(--gold3)">🔴 ETF Distribuzione — Cedola (${etfDist.length})</td></tr>`;
    tableHTML += etfDist.map(e=>etfRow(e,true)).join('');
    if(cedolaTot>0){
      tableHTML += `<tr class="cedola-row">
        <td colspan="3">Cedola annua stimata</td>
        <td colspan="5">${fmtE(cedolaTot)}/anno · €${Math.round(cedolaTot/12).toLocaleString('it-IT')}/mese</td>
      </tr>`;
    }
  }
  if(etfAcc.length>0){
    tableHTML += `<tr class="section-label-row"><td colspan="8" style="color:var(--blue)">🔵 ETF Accumulazione — Perf. 1 Anno (${etfAcc.length})</td></tr>`;
    tableHTML += etfAcc.map(e=>etfRow(e,false)).join('');
  }
  if(!etfDist.length&&!etfAcc.length){
    tableHTML = `<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--text2)">Nessun ETF in portafoglio</td></tr>`;
  }

  const alertsHTML = alerts.length>0 ? `
    <div class="alerts-section">
      <div style="font-size:8px;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin-bottom:8px">Alert Registrati</div>
      ${alerts.map(a=>`
        <div class="alert-item">
          <span class="alert-icon">⚠</span>
          <span class="alert-ticker">${a.ticker}</span>
          <span class="alert-desc">&nbsp;— ${a.motivo} · ${a.data} · Entry €${(a.price_entry||0).toFixed(2)} → Exit €${(a.price_exit||0).toFixed(2)} · Perf: ${(a.perf_pct||0).toFixed(1)}%</span>
        </div>`).join('')}
    </div>` : '';

  const versStr = storia.length>1
    ? `<div style="font-size:9px;color:var(--text2);margin-top:8px">${storia.length} versioni · ${storia.length-1} ribilanciament${storia.length-1===1?'o':'i'}</div>`
    : '';

  return `
  <div class="level-card" id="level-${lid}">
    <div class="level-card-header">
      <div class="level-stripe" style="background:${info.colore}"></div>
      <div class="level-header-content">
        <div style="display:flex;align-items:center">
          <div class="level-id-large" style="color:${info.colore}">${lid}</div>
          <div class="level-meta">
            <div class="level-nome">${info.nome}</div>
            <div class="level-tipo">${info.tipo} · ${info.obiettivo}</div>
            ${versStr}
          </div>
        </div>
        <div class="level-kpis">
          <div class="lkpi">
            <div class="lkpi-label">Performance</div>
            <div class="lkpi-val ${perfClass}">${fmt(perf,1)}</div>
          </div>
          <div class="lkpi">
            <div class="lkpi-label">Guadagno</div>
            <div class="lkpi-val" style="color:${eur>=0?'var(--green)':'var(--red)'}">${eur>=0?'+':'-'}${fmtEa(eur)}</div>
          </div>
          <div class="lkpi">
            <div class="lkpi-label">Capitale Attuale</div>
            <div class="lkpi-val" style="font-size:16px">${fmtE(capAtt)}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="level-card-body">
      <table class="etf-table">
        <thead>
          <tr>
            <th>Ticker</th>
            <th>Nome ETF</th>
            <th>Peso</th>
            <th>Importo</th>
            <th>Entry 01/01/25</th>
            <th>Prezzo Ora</th>
            <th>Perf%</th>
            <th>${isDist?'Yield%':'Perf 1a%'}</th>
          </tr>
        </thead>
        <tbody>${tableHTML}</tbody>
      </table>
      ${alertsHTML}
      ${buildBenchmarkSection(lid, ptfData)}
      <div class="commento">
        <div class="commento-eyebrow">Analisi del Periodo</div>
        <div class="commento-text">${COMMENTI[lid]||'—'}</div>
      </div>
    </div>
  </div>`;
}

// Variabili globali popolate al caricamento dati
let procVer = '2.000';
let gen = '—';
let genOra = '—';
let libroGen = new Date().toLocaleString('it-IT',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});

async function render(){
  try {
    const data = await loadData();
    const pm = data.portafogli_modello||{};
    const etfs = data.etfs||{};
    const rm = data.regime_macro;
    window._benchmarks = data.benchmarks||{};

    let html = buildCover(data);
    html += buildRegime(rm);
    html += buildRanking(pm);
    html += buildTOC(pm);

    // Livelli cedola
    const cedola = Object.keys(pm).filter(k=>k.startsWith('C')).sort();
    const acc = Object.keys(pm).filter(k=>k.startsWith('A')).sort();

    html += `<div class="levels-section">
      <div class="level-group-title">🔴 Portafogli Distribuzione (Cedola)</div>
      ${cedola.map(lid=>buildLevelCard(lid,pm[lid],etfs)).join('')}
    </div>`;

    html += `<div class="levels-section">
      <div class="level-group-title">🔵 Portafogli Accumulazione</div>
      ${acc.map(lid=>buildLevelCard(lid,pm[lid],etfs)).join('')}
    </div>`;

    html += `<div class="book-footer">
      COMPASS Wealth Management · Procedura v${procVer} · Documento riservato · Non costituisce consulenza d'investimento<br>
      Dati aggiornati al ${gen} ${genOra} UTC · Libro generato il ${libroGen} · Aggiornamento automatico notturno
    </div>`;

    document.getElementById('loading').style.display = 'none';
    const content = document.getElementById('content');
    content.innerHTML = html;
    content.style.display = 'block';

  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#8B1A1A">Errore: ${e.message}</div>`;
  }
}

render();
</script>
</body>
</html>
