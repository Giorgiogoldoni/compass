name: COMPASS Data Fetch
on:
  schedule:
    # Ogni giorno lun-ven alle 21:30 UTC (23:30 ora italiana)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # Esecuzione manuale dal pannello GitHub
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance requests
      - name: Run COMPASS fetch
        run: python compass_fetch.py
      - name: Run Factor Strategy
        run: python compass_factor.py
      - name: Run 3 Linee Strategy
        run: python compass_3linee.py
      - name: Commit and push
        run: |
          git config user.name "COMPASS Bot"
          git config user.email "compass@raptor.rwm"
          git add data/compass_data.json data/compass_factor.json data/compass_3linee.json
          git diff --cached --quiet || git commit -m "COMPASS: aggiornamento dati $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
