name: RAPTOR Wealth Meridian

on:
  schedule:
    # Notturno — ogni giorno feriale alle 02:30 IT (01:30 UTC)
    - cron: '30 1 * * 1-5'
    # Live pomeriggio — 15:30 IT (14:30 UTC)
    - cron: '30 14 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy -q

      - name: Run fetch_rwm
        run: python fetch_rwm.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: update rwm_signals [$(date -u '+%Y-%m-%d %H:%M')]"
          git push
