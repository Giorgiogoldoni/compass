<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — Universo ETF</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--gold:#C9A84C;--ink:#0A0A12;--paper:#F7F4EE;--paper2:#EDE8DF;--text:#1A1828;--text2:#6B6580;--green:#1A6B3A;--red:#8B1A1A;--blue:#1A3A6B;--border:#D4CDB8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Mono',monospace;background:var(--paper);color:var(--text);font-size:11px;}
.toolbar{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--ink);border-bottom:1px solid #8B6914;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:48px;}
.toolbar-brand{font-size:13px;color:var(--gold);letter-spacing:1px;}
.toolbar-actions{display:flex;gap:8px;align-items:center;}
.btn{padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:2px;border:none;}
.btn-gold{background:var(--gold);color:var(--ink);font-weight:500;}
.btn-gold:hover{background:#E8C96A;}
.btn-outline{background:transparent;color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.2);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);}
.btn-green{background:#1A6B3A;color:white;}
.btn-green:hover{background:#15573A;}
#update-info{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.main{margin-top:48px;padding:20px 24px;}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--border);background:white;font-family:'DM Mono',monospace;font-size:11px;border-radius:2px;}
.filter-select{padding:8px 12px;border:1px solid var(--border);background:white;font-family:'DM Mono',monospace;font-size:11px;border-radius:2px;}
.stats-row{display:flex;gap:20px;margin-bottom:12px;font-size:10px;color:var(--text2);}
.stat strong{color:var(--text);}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead{position:sticky;top:48px;z-index:10;}
th{background:var(--ink);color:rgba(255,255,255,0.7);padding:8px 10px;text-align:left;font-size:8px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--gold);}
th.sorted-asc::after{content:' ↑';}
th.sorted-desc::after{content:' ↓';}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:hover td{background:rgba(201,168,76,0.04);}
.pos{color:var(--green);font-weight:500;}
.neg{color:var(--red);font-weight:500;}
.ticker{font-weight:500;color:var(--blue);}
.segnale{padding:2px 8px;border-radius:2px;font-size:9px;font-weight:500;display:inline-block;}
.segnale-BUY{background:rgba(26,107,58,0.15);color:var(--green);}
.segnale-HOLD{background:rgba(26,58,107,0.15);color:var(--blue);}
.segnale-WATCH{background:rgba(201,168,76,0.15);color:#8B6914;}
.segnale-SELL{background:rgba(139,26,26,0.15);color:var(--red);}
.segnale-ND{background:rgba(107,101,128,0.1);color:var(--text2);}
.tipo-Acc{color:var(--blue);font-size:9px;}
.tipo-Dist{color:var(--green);font-size:9px;}
.score-bar{width:60px;height:4px;background:var(--paper2);border-radius:2px;overflow:hidden;display:inline-block;vertical-align:middle;margin-right:6px;}
.score-fill{height:100%;border-radius:2px;}
.custom-badge{background:rgba(201,168,76,0.2);color:var(--gold);border:1px solid rgba(201,168,76,0.4);padding:1px 5px;border-radius:2px;font-size:8px;margin-left:4px;}
.loading{display:flex;align-items:center;justify-content:center;height:60vh;color:var(--text2);}
.spinner{width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-brand">COMPASS · Universo ETF</div>
  <div class="toolbar-actions">
    <span id="update-info">—</span>
    <button class="btn btn-outline" onclick="window.location='advisor.html'">← Advisor</button>
    <button class="btn btn-outline" onclick="window.location='libro.html'">📖 Libro</button>
    <button class="btn btn-green" onclick="scaricaExcel()">📥 Scarica Excel</button>
    <button class="btn btn-gold" onclick="scaricaCSV()">📥 Scarica CSV</button>
  </div>
</div>

<div class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>Caricamento universo ETF...
  </div>
  <div id="content" style="display:none">
    <div class="controls">
      <input class="search-box" id="search" placeholder="Cerca ticker, nome, categoria..." oninput="filtra()">
      <select class="filter-select" id="filtro-segnale" onchange="filtra()">
        <option value="">Tutti i segnali</option>
        <option value="BUY">BUY</option>
        <option value="HOLD">HOLD</option>
        <option value="WATCH">WATCH</option>
        <option value="SELL">SELL</option>
      </select>
      <select class="filter-select" id="filtro-categoria" onchange="filtra()">
        <option value="">Tutte le categorie</option>
        <option value="monetario">Monetario</option>
        <option value="obbligaz_ig">Obbligazionario IG</option>
        <option value="hy">High Yield</option>
        <option value="em_bond">EM Bond</option>
        <option value="az_globale">Azionario Globale</option>
        <option value="az_europa">Azionario Europa</option>
        <option value="az_usa">Azionario USA</option>
        <option value="az_em">Azionario EM</option>
        <option value="tematico">Tematico</option>
        <option value="leva">Leva</option>
        <option value="multi_asset">Multi-Asset</option>
      </select>
      <select class="filter-select" id="filtro-tipo" onchange="filtra()">
        <option value="">Acc + Dist</option>
        <option value="Acc">Solo Acc</option>
        <option value="Dist">Solo Dist</option>
      </select>
    </div>
    <div class="stats-row" id="stats-row"></div>
    <table id="etf-table">
      <thead>
        <tr>
          <th onclick="sortBy('ticker')">Ticker</th>
          <th onclick="sortBy('nome')">Nome ETF</th>
          <th onclick="sortBy('categoria')">Categoria</th>
          <th onclick="sortBy('tipo')">Tipo</th>
          <th onclick="sortBy('segnale')">Segnale</th>
          <th onclick="sortBy('score')">Score</th>
          <th onclick="sortBy('price')">Prezzo</th>
          <th onclick="sortBy('ret_1d')">1g%</th>
          <th onclick="sortBy('perf_1a')">1a%</th>
          <th onclick="sortBy('mom1m')">Mom1M</th>
          <th onclick="sortBy('mom3m')">Mom3M</th>
          <th onclick="sortBy('mom6m')">Mom6M</th>
          <th onclick="sortBy('yield_pct')">Yield%</th>
        </tr>
      </thead>
      <tbody id="etf-body"></tbody>
    </table>
  </div>
</div>

<script>
const BASE = 'data/';
let ALL_ETF = [];
let sortCol = 'score';
let sortDir = -1;

async function loadData(){
  const resp = await fetch(BASE+'compass_data.json?t='+Date.now());
  const data = await resp.json();
  const etfs = data.etfs||{};
  const custom = data.etf_custom||{};
  const gen = data.generated ? new Date(data.generated).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const ver = data.procedure_version||'—';
  document.getElementById('update-info').innerHTML = `v${ver} · ${gen}`;

  ALL_ETF = Object.values(etfs).map(e=>({...e, _custom: (custom.aggiunti||[]).includes(e.ticker)}));
  filtra();
  document.getElementById('loading').style.display='none';
  document.getElementById('content').style.display='block';
}

function filtra(){
  const q = document.getElementById('search').value.toLowerCase();
  const fSeg = document.getElementById('filtro-segnale').value;
  const fCat = document.getElementById('filtro-categoria').value;
  const fTip = document.getElementById('filtro-tipo').value;

  let rows = ALL_ETF.filter(e=>{
    if(q && !e.ticker?.toLowerCase().includes(q) && !e.nome?.toLowerCase().includes(q) && !e.categoria?.toLowerCase().includes(q)) return false;
    if(fSeg && e.segnale !== fSeg) return false;
    if(fCat && e.categoria !== fCat) return false;
    if(fTip && e.tipo !== fTip) return false;
    return true;
  });

  // Sort
  rows.sort((a,b)=>{
    const av = a[sortCol]??-9999;
    const bv = b[sortCol]??-9999;
    if(typeof av === 'string') return av.localeCompare(bv)*sortDir;
    return (av-bv)*sortDir;
  });

  // Stats
  const buy = rows.filter(e=>e.segnale==='BUY').length;
  const hold = rows.filter(e=>e.segnale==='HOLD').length;
  const watch = rows.filter(e=>e.segnale==='WATCH').length;
  const sell = rows.filter(e=>e.segnale==='SELL').length;
  document.getElementById('stats-row').innerHTML =
    `<span>${rows.length} ETF mostrati</span>
     <span>·</span>
     <span><strong style="color:var(--green)">${buy} BUY</strong></span>
     <span><strong style="color:var(--blue)">${hold} HOLD</strong></span>
     <span><strong style="color:#8B6914">${watch} WATCH</strong></span>
     <span><strong style="color:var(--red)">${sell} SELL</strong></span>`;

  // Render rows
  document.getElementById('etf-body').innerHTML = rows.map(e=>{
    const score = e.score||0;
    const sc = e.score||0;
    const barColor = sc>=70?'#1A6B3A':sc>=45?'#1A3A6B':sc>=25?'#8B6914':'#8B1A1A';
    const segCls = 'segnale-'+(e.segnale?.replace('/','').replace(' ','') || 'ND');
    const p1d = e.ret_1d; const p1a = e.perf_1a;
    const m1 = e.mom1m; const m3 = e.mom3m; const m6 = e.mom6m;
    const fmt = (v,d=1) => v==null?'—':(v>=0?'+':'')+v.toFixed(d)+'%';
    const fmtP = (v) => v==null?'—':'€'+v.toLocaleString('it-IT',{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<tr>
      <td><span class="ticker">${e.ticker||'—'}</span>${e._custom?'<span class="custom-badge">custom</span>':''}</td>
      <td style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.nome||'—'}</td>
      <td style="color:var(--text2)">${e.categoria||'—'}</td>
      <td><span class="tipo-${e.tipo||'Acc'}">${e.tipo||'—'}</span></td>
      <td><span class="segnale ${segCls}">${e.segnale||'N/D'}</span></td>
      <td>
        <div style="display:flex;align-items:center">
          <div class="score-bar"><div class="score-fill" style="width:${sc}%;background:${barColor}"></div></div>
          <span>${sc}</span>
        </div>
      </td>
      <td>${fmtP(e.price)}</td>
      <td class="${p1d>=0?'pos':'neg'}">${fmt(p1d,2)}</td>
      <td class="${p1a>=0?'pos':'neg'}">${fmt(p1a,1)}</td>
      <td class="${m1>=0?'pos':'neg'}">${fmt(m1,1)}</td>
      <td class="${m3>=0?'pos':'neg'}">${fmt(m3,1)}</td>
      <td class="${m6>=0?'pos':'neg'}">${fmt(m6,1)}</td>
      <td style="color:var(--gold)">${e.yield_pct>0?e.yield_pct.toFixed(1)+'%':'—'}</td>
    </tr>`;
  }).join('');
}

function sortBy(col){
  if(sortCol===col) sortDir*=-1; else {sortCol=col;sortDir=-1;}
  document.querySelectorAll('th').forEach(th=>{th.classList.remove('sorted-asc','sorted-desc');});
  const idx = ['ticker','nome','categoria','tipo','segnale','score','price','ret_1d','perf_1a','mom1m','mom3m','mom6m','yield_pct'].indexOf(col);
  if(idx>=0){
    const th = document.querySelectorAll('th')[idx];
    th.classList.add(sortDir===-1?'sorted-desc':'sorted-asc');
  }
  filtra();
}

function scaricaCSV(){
  const rows = ALL_ETF;
  const cols = ['ticker','nome','categoria','tipo','segnale','score','price','ret_1d','perf_1a','mom1m','mom3m','mom6m','yield_pct','sma200','kama'];
  const header = cols.join(';');
  const body = rows.map(r=>cols.map(c=>{
    const v = r[c];
    return v==null?'':typeof v==='string'?'"'+v+'"':String(v);
  }).join(';')).join('\n');
  const blob = new Blob(['\uFEFF'+header+'\n'+body],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='compass_universo_etf.csv'; a.click();
}

function scaricaExcel(){
  // Genera HTML table formattata come Excel-friendly
  const rows = ALL_ETF;
  const cols = ['ticker','nome','categoria','tipo','segnale','score','price','ret_1d','perf_1a','mom1m','mom3m','mom6m','yield_pct','sma200','kama'];
  const labels = ['Ticker','Nome ETF','Categoria','Tipo','Segnale','Score','Prezzo','Ret 1g%','Perf 1a%','Mom 1M%','Mom 3M%','Mom 6M%','Yield%','SMA200','KAMA'];
  let html = '<html><head><meta charset="UTF-8"></head><body>';
  html += '<table border="1" style="font-family:Arial;font-size:11px">';
  html += '<tr style="background:#0A0A12;color:white">'+labels.map(l=>`<th>${l}</th>`).join('')+'</tr>';
  rows.forEach(r=>{
    const segColor = r.segnale==='BUY'?'#D4EDDA':r.segnale==='HOLD'?'#D1ECF1':r.segnale==='WATCH'?'#FFF3CD':'#F8D7DA';
    html += '<tr>';
    cols.forEach((c,i)=>{
      const v = r[c];
      const bg = c==='segnale'?`background:${segColor}`:'';
      html += `<td style="${bg}">${v==null?'':v}</td>`;
    });
    html += '</tr>';
  });
  html += '</table></body></html>';
  const blob = new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='compass_universo_etf.xls'; a.click();
}

loadData().catch(e=>{
  document.getElementById('loading').innerHTML='<div style="color:var(--red)">Errore: '+e.message+'</div>';
});
</script>
</body>
</html>
