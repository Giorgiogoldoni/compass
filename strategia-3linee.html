<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — Strategia 3 Linee</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C; --gold2: #E8C96A; --gold3: #8B6914;
  --ink: #0D0D1A; --paper: #F7F4EE; --paper2: #EDE8DF;
  --text: #1A1828; --text2: #6B6580;
  --green: #1A6B3A; --red: #8B1A1A; --blue: #1A3A6B;
  --border: #D4CDB8;
  --M: #0EA5E9; --M2: #BAE6FD; --M3: #0369A1;
  --O: #8B5CF6; --O2: #DDD6FE; --O3: #6D28D9;
  --A: #DC2626; --A2: #FECACA; --A3: #991B1B;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Mono',monospace; background:var(--paper); color:var(--text); font-size:11px; line-height:1.7; }

/* TOOLBAR */
.toolbar {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  background:var(--ink); border-bottom:1px solid var(--gold3);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px; height:52px;
}
.toolbar-brand { font-family:'Playfair Display',serif; font-size:15px; color:var(--gold); letter-spacing:1px; }
.toolbar-brand span { color:rgba(255,255,255,0.4); font-size:10px; margin-left:8px; }
.toolbar-actions { display:flex; gap:10px; align-items:center; }
.btn-outline { background:transparent; color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.2); padding:7px 14px; font-family:'DM Mono',monospace; font-size:10px; cursor:pointer; border-radius:2px; transition:all 0.2s; text-decoration:none; display:inline-block; }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.btn-gold { background:var(--gold); color:var(--ink); border:none; padding:8px 18px; font-family:'DM Mono',monospace; font-size:10px; font-weight:500; letter-spacing:1px; cursor:pointer; border-radius:2px; }
.btn-gold:hover { background:var(--gold2); }
#update-info { font-size:9px; color:rgba(255,255,255,0.3); }

/* LAYOUT */
.main { max-width:1200px; margin:72px auto 60px; padding:0 32px; }

/* HERO */
.hero {
  padding:60px 0 48px;
  border-bottom:2px solid var(--gold);
  margin-bottom:48px;
  display:grid; grid-template-columns:1fr 1fr;
  gap:48px; align-items:center;
}
.hero-left {}
.hero-eyebrow { font-size:9px; letter-spacing:4px; color:var(--gold3); text-transform:uppercase; margin-bottom:16px; }
.hero-title { font-family:'Playfair Display',serif; font-size:48px; font-weight:700; line-height:1.1; color:var(--ink); margin-bottom:12px; }
.hero-title em { color:var(--gold3); font-style:italic; }
.hero-sub { font-family:'Playfair Display',serif; font-size:16px; color:var(--text2); font-style:italic; margin-bottom:32px; }
.hero-badges { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
.badge { padding:5px 12px; border-radius:2px; font-size:9px; letter-spacing:2px; font-weight:500; text-transform:uppercase; }
.badge-M { background:var(--M2); color:var(--M3); border:1px solid var(--M); }
.badge-O { background:var(--O2); color:var(--O3); border:1px solid var(--O); }
.badge-A { background:var(--A2); color:var(--A3); border:1px solid var(--A); }
.badge-gold { background:rgba(201,168,76,0.15); color:var(--gold3); border:1px solid var(--gold); }

.hero-right { display:flex; flex-direction:column; gap:12px; }

/* KPI CARDS */
.kpi-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:32px; }
.kpi-card {
  background:white; border:1px solid var(--border);
  padding:18px 20px; border-radius:3px;
  border-top:3px solid transparent;
  position:relative; overflow:hidden;
}
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.kpi-card.M::before { background:var(--M); }
.kpi-card.O::before { background:var(--O); }
.kpi-card.A::before { background:var(--A); }
.kpi-linea { font-size:8px; letter-spacing:3px; color:var(--text2); text-transform:uppercase; margin-bottom:6px; }
.kpi-nome { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; color:var(--ink); margin-bottom:12px; }
.kpi-perf { font-family:'Playfair Display',serif; font-size:32px; font-weight:700; }
.kpi-perf.pos { color:var(--green); }
.kpi-perf.neg { color:var(--red); }
.kpi-meta { display:flex; gap:16px; margin-top:10px; flex-wrap:wrap; }
.kpi-meta-item { }
.kpi-meta-label { font-size:7px; letter-spacing:1px; color:var(--text2); text-transform:uppercase; }
.kpi-meta-val { font-size:10px; font-weight:500; color:var(--text); }
.kpi-bm { font-size:9px; margin-top:8px; padding:3px 8px; border-radius:2px; display:inline-block; }
.kpi-bm.over { background:rgba(26,107,58,0.1); color:var(--green); }
.kpi-bm.under { background:rgba(139,26,26,0.1); color:var(--red); }

/* REGIME BANNER */
.regime-banner {
  background:white; border:1px solid var(--border);
  border-left:4px solid var(--gold);
  padding:16px 24px; margin-bottom:32px;
  display:flex; align-items:center; gap:24px;
}
.regime-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.regime-label { font-size:8px; letter-spacing:3px; color:var(--text2); text-transform:uppercase; }
.regime-val { font-family:'Playfair Display',serif; font-size:20px; font-weight:700; }
.regime-conf { font-size:9px; color:var(--text2); }
.regime-ranges { display:flex; gap:16px; margin-left:auto; flex-wrap:wrap; }
.regime-range { text-align:center; }
.regime-range-label { font-size:7px; letter-spacing:2px; color:var(--text2); text-transform:uppercase; display:block; }
.regime-range-val { font-size:11px; font-weight:500; color:var(--text); }

/* SECTION */
.section-head { display:flex; align-items:baseline; gap:16px; margin-bottom:20px; padding-bottom:10px; border-bottom:1px solid var(--border); }
.section-eyebrow { font-size:8px; letter-spacing:4px; color:var(--gold3); text-transform:uppercase; }
.section-h2 { font-family:'Playfair Display',serif; font-size:24px; font-weight:700; color:var(--ink); }

/* LINEA PANELS */
.linea-tabs { display:flex; gap:0; margin-bottom:0; border-bottom:2px solid var(--border); }
.linea-tab {
  padding:12px 24px; font-size:10px; font-weight:500; letter-spacing:1px;
  cursor:pointer; border:none; background:transparent;
  color:var(--text2); border-bottom:2px solid transparent;
  margin-bottom:-2px; transition:all 0.2s; font-family:'DM Mono',monospace;
}
.linea-tab.active.M { color:var(--M3); border-bottom-color:var(--M); }
.linea-tab.active.O { color:var(--O3); border-bottom-color:var(--O); }
.linea-tab.active.A { color:var(--A3); border-bottom-color:var(--A); }
.linea-tab:hover { color:var(--text); }

.linea-panel { display:none; padding:24px 0; }
.linea-panel.active { display:block; }

/* ETF TABLE */
.etf-table { width:100%; border-collapse:collapse; font-size:10px; margin-bottom:16px; }
.etf-table th { font-size:7px; letter-spacing:2px; color:var(--text2); text-transform:uppercase; padding:6px 10px; border-bottom:2px solid var(--ink); background:var(--paper2); text-align:left; white-space:nowrap; }
.etf-table td { padding:7px 10px; border-bottom:1px solid rgba(0,0,0,0.05); vertical-align:middle; }
.etf-table tr:hover td { background:rgba(201,168,76,0.03); }
.etf-tk { font-weight:500; color:var(--blue); font-size:11px; }
.etf-nm { color:var(--text2); max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pos { color:var(--green); font-weight:500; }
.neg { color:var(--red); font-weight:500; }
.wt { font-weight:500; }

/* DIARIO */
.diario-item { border:1px solid var(--border); border-radius:3px; margin-bottom:10px; overflow:hidden; }
.diario-header { background:var(--paper2); padding:10px 14px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border); }
.diario-data { font-size:8px; color:var(--text2); letter-spacing:1px; }
.diario-ver { font-size:9px; font-weight:500; color:var(--text2); }
.diario-trigger { font-size:9px; flex:1; }
.diario-body { padding:10px 14px; }

/* ROTATION */
.rotation-alert {
  background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.4);
  border-left:4px solid var(--gold); padding:14px 18px; border-radius:2px;
  margin-bottom:16px;
}
.rotation-label { font-size:8px; letter-spacing:3px; color:var(--gold3); text-transform:uppercase; margin-bottom:8px; }
.rotation-flow { display:flex; align-items:center; gap:12px; font-size:11px; }
.rotation-out { color:var(--red); font-weight:500; }
.rotation-in { color:var(--green); font-weight:500; }
.rotation-arrow { color:var(--gold3); font-size:16px; }
.rotation-gap { font-size:9px; color:var(--text2); background:rgba(0,0,0,0.05); padding:2px 8px; border-radius:10px; }

/* HEATMAP */
#heatmap-wrap { overflow-x:auto; margin-bottom:8px; }

/* CHART */
canvas { max-width:100%; display:block; }

/* ARCHITETTURA */
.arch-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:32px; }
.arch-card { padding:20px; border:1px solid var(--border); border-radius:3px; background:white; }
.arch-card h4 { font-size:9px; letter-spacing:3px; text-transform:uppercase; margin-bottom:12px; font-weight:500; }
.arch-card.M h4 { color:var(--M3); }
.arch-card.O h4 { color:var(--O3); }
.arch-card.A h4 { color:var(--A3); }
.arch-pool { display:flex; flex-wrap:wrap; gap:4px; }
.arch-chip { padding:3px 8px; border-radius:2px; font-size:9px; font-weight:500; }
.arch-chip.M { background:var(--M2); color:var(--M3); }
.arch-chip.O { background:var(--O2); color:var(--O3); }
.arch-chip.A { background:var(--A2); color:var(--A3); }

/* RANGE TABLE */
.range-table { width:100%; border-collapse:collapse; font-size:10px; margin-bottom:32px; }
.range-table th { font-size:7px; letter-spacing:2px; color:var(--text2); text-transform:uppercase; padding:8px 12px; border-bottom:2px solid var(--ink); background:var(--paper2); text-align:left; }
.range-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
.range-table tr:hover td { background:rgba(201,168,76,0.03); }
.range-bar { height:8px; border-radius:4px; display:inline-block; vertical-align:middle; margin-right:6px; }

/* LOADING */
.loading { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; gap:16px; color:var(--text2); }
.spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* FASE2 BANNER */
.fase2-banner {
  background:var(--ink); color:rgba(255,255,255,0.7);
  border:1px solid var(--gold3); border-radius:3px;
  padding:20px 24px; margin-bottom:32px;
  display:flex; align-items:center; gap:20px;
}
.fase2-icon { font-size:24px; }
.fase2-title { font-family:'Playfair Display',serif; font-size:16px; color:var(--gold); margin-bottom:4px; }
.fase2-desc { font-size:10px; color:rgba(255,255,255,0.5); line-height:1.8; }

/* ROTAZIONI */
.rot-list { margin:0; }
.rot-item { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--border); font-size:10px; }
.rot-date { font-size:8px; color:var(--text2); width:80px; flex-shrink:0; }
.rot-out { color:var(--red); font-weight:500; }
.rot-in { color:var(--green); font-weight:500; }
.rot-gap { font-size:9px; color:var(--text2); margin-left:auto; }

@media print {
  .toolbar { display:none!important; }
  .main { margin-top:0; }
}
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-brand">COMPASS <span>3 LINEE</span></div>
  <div class="toolbar-actions">
    <span id="update-info">—</span>
    <a href="advisor.html" class="btn-outline">← Advisor</a>
    <a href="libro.html" class="btn-outline">📖 Libro</a>
    <a href="strategia-factor.html" class="btn-outline">⚡ Factor</a>
    <button class="btn-gold" onclick="window.print()">🖨 Stampa</button>
  </div>
</div>

<div class="main">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Caricamento 3 Linee...</div>
  </div>
  <div id="content" style="display:none"></div>
</div>

<script>
const BASE = 'data/';
const LINEE_META = {
  M: { nome:'Monetario', colore:'var(--M)', colore3:'var(--M3)', benchmark:'XEON.MI', soglia:'No rotation', desc:'Protezione capitale e ottimizzazione yield overnight BCE' },
  O: { nome:'Obbligazionario', colore:'var(--O)', colore3:'var(--O3)', benchmark:'IEAG.MI', soglia:'+12% rotation', desc:'Bond rotation su regime macro — IG, HY, EM, Duration' },
  A: { nome:'Azionario', colore:'var(--A)', colore3:'var(--A3)', benchmark:'IWMO.MI', soglia:'+15% rotation', desc:'Identica ad A7 Factor — la migliore in termini risk-adjusted' },
};

const SCENARI_COL = { goldilocks:'#1A6B3A', reflazione:'#B8860B', stagflazione:'#8B1A1A', risk_off:'#6B1A1A', neutro:'#4B5563' };

const RANGE_REGIME = {
  goldilocks:   { M:[5,20],   O:[15,35], A:[50,80] },
  reflazione:   { M:[10,25],  O:[20,40], A:[35,65] },
  stagflazione: { M:[30,60],  O:[25,45], A:[0,25]  },
  risk_off:     { M:[40,70],  O:[20,45], A:[0,20]  },
  neutro:       { M:[15,30],  O:[25,40], A:[30,55] },
};

function fmt(n,d=1){ return n==null?'—':(n>=0?'+':'')+n.toFixed(d)+'%'; }
function fmtE(n){ return n==null?'—':'€'+Math.round(n).toLocaleString('it-IT'); }
function fmtEa(n){ return n==null?'—':'€'+Math.round(Math.abs(n)).toLocaleString('it-IT'); }

async function loadData(){
  const r = await fetch(BASE+'compass_3linee.json?t='+Date.now());
  return r.json();
}

function buildHero(data, portafogli){
  const gen = data.generated ? new Date(data.generated).toLocaleString('it-IT') : '—';
  document.getElementById('update-info').textContent = '3 Linee v'+data.run_number+' · '+gen;

  const rg = data.regime_oggi||{};
  const sc = rg.scenario||'neutro';
  const conf = rg.confidence||50;
  const col = SCENARI_COL[sc]||'#888';
  const range = RANGE_REGIME[sc]||{};
  const bm = data.benchmarks||{};

  const kpiHTML = ['M','O','A'].map(lid=>{
    const ptf = portafogli[lid]||{};
    const meta = LINEE_META[lid];
    const perf = ptf.performance_totale_pct;
    const eur  = ptf.performance_totale_eur;
    const vol  = ptf.volatilita_ann;
    const mdd  = ptf.max_drawdown;
    const sh   = ptf.sharpe;
    const out  = ptf.outperformance_bm;
    const batte = ptf.batte_benchmark;
    const bmPerf = bm[meta.benchmark]?.perf_pct;
    return `<div class="kpi-card ${lid}">
      <div class="kpi-linea">Linea ${lid}</div>
      <div class="kpi-nome">${meta.nome}</div>
      <div class="kpi-perf ${perf>=0?'pos':'neg'}">${fmt(perf)}</div>
      <div class="kpi-meta">
        <div class="kpi-meta-item"><div class="kpi-meta-label">Guadagno</div><div class="kpi-meta-val">${perf>=0?'+':'-'}${fmtEa(eur)}</div></div>
        <div class="kpi-meta-item"><div class="kpi-meta-label">Vol/a</div><div class="kpi-meta-val">${vol!=null?vol.toFixed(1)+'%':'—'}</div></div>
        <div class="kpi-meta-item"><div class="kpi-meta-label">Max DD</div><div class="kpi-meta-val">${mdd!=null?mdd.toFixed(1)+'%':'—'}</div></div>
        <div class="kpi-meta-item"><div class="kpi-meta-label">Sharpe</div><div class="kpi-meta-val">${sh!=null?sh.toFixed(2):'—'}</div></div>
      </div>
      ${out!=null?`<div class="kpi-bm ${batte?'over':'under'}">${batte?'✅':'❌'} vs ${meta.benchmark}: ${out>=0?'+':''}${out.toFixed(1)}pp (bm ${bmPerf!=null?fmt(bmPerf):'—'})</div>`:''}
    </div>`;
  }).join('');

  const rangeHTML = ['M','O','A'].map(lid=>{
    const r = range[lid]||[0,100];
    return `<div class="regime-range">
      <span class="regime-range-label">Linea ${lid}</span>
      <span class="regime-range-val">${r[0]}-${r[1]}%</span>
    </div>`;
  }).join('');

  return `
  <div class="hero">
    <div class="hero-left">
      <div class="hero-eyebrow">Strategia Quantitativa · Fase 1</div>
      <div class="hero-title">3 <em>Linee</em><br>COMPASS</div>
      <div class="hero-sub">Monetario · Obbligazionario · Azionario</div>
      <div class="hero-badges">
        <span class="badge badge-M">M Monetario</span>
        <span class="badge badge-O">O Obbligazionario</span>
        <span class="badge badge-A">A Azionario</span>
        <span class="badge badge-gold">Backtest Jan 2025 → Oggi</span>
      </div>
      <div style="font-size:9px;color:var(--text2);line-height:1.8">
        Tre portafogli indipendenti da €100.000 ciascuno.<br>
        Fase 2 (in sviluppo): rotation capitale tra le linee basata su regime + momentum.
      </div>
    </div>
    <div class="hero-right">
      ${kpiHTML}
    </div>
  </div>
  <div class="regime-banner">
    <div class="regime-dot" style="background:${col}"></div>
    <div>
      <div class="regime-label">Regime Macro Corrente</div>
      <div class="regime-val" style="color:${col}">${sc.toUpperCase()}</div>
      <div class="regime-conf">Confidence ${conf}% · Aggiornato oggi</div>
    </div>
    <div class="regime-ranges">
      <div style="font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;grid-column:1/-1">Range target in questo regime (Fase 2)</div>
      ${rangeHTML}
    </div>
  </div>`;
}

function buildLineeSection(portafogli, bm){
  const tabs = ['M','O','A'].map(lid=>`
    <button class="linea-tab ${lid}" onclick="switchTab('${lid}')" id="tab-${lid}">
      Linea ${lid} — ${LINEE_META[lid].nome}
    </button>`).join('');

  const panels = ['M','O','A'].map(lid=>{
    const ptf = portafogli[lid]||{};
    const meta = LINEE_META[lid];
    const storia = ptf.storia||[];
    const verAtt = storia.find(v=>!v.data_chiusura)||storia[storia.length-1]||{};
    const comp = verAtt.composizione||[];
    const diario = ptf.diario_movimenti||[];
    const rot = ptf.rotation_suggerita;
    const rotazioni = [];
    storia.forEach(v=>(v.etf_usciti||[]).forEach(u=>{if(u.motivo==='rotation_momentum')rotazioni.push({...u,ver:v.versione});}));

    const rotAlert = rot ? `
    <div class="rotation-alert">
      <div class="rotation-label">⚡ Rotation Trigger Attivo</div>
      <div class="rotation-flow">
        <span class="rotation-out">${rot.out}</span>
        <span style="color:var(--text2)">mom3M ${rot.mom3m_out?.toFixed(1)}%</span>
        <span class="rotation-arrow">→</span>
        <span class="rotation-in">${rot.in}</span>
        <span style="color:var(--text2)">mom3M ${rot.mom3m_in?.toFixed(1)}%</span>
        <span class="rotation-gap">Gap: +${rot.gap?.toFixed(1)}%</span>
      </div>
      <div style="font-size:9px;color:var(--text2);margin-top:6px">${rot.motivo||''}</div>
    </div>` : '';

    const etfRows = comp.filter(e=>(e.peso||0)>0).map(e=>{
      const p = e.perf_pct||0;
      return `<tr>
        <td class="etf-tk">${e.ticker}</td>
        <td class="etf-nm">${e.nome||'—'}</td>
        <td class="wt">${(e.peso||0).toFixed(1)}%</td>
        <td>${fmtE(e.importo)}</td>
        <td style="font-family:'DM Mono';font-size:9px">€${(e.price_entry||0).toFixed(2)}</td>
        <td style="font-family:'DM Mono';font-size:9px">${e.price_now?'€'+e.price_now.toFixed(2):'—'}</td>
        <td class="${p>=0?'pos':'neg'}">${fmt(p,2)}</td>
        <td style="font-size:9px;color:var(--text2)">${e.score_entry||'—'}</td>
        <td style="font-size:9px;color:var(--text2)">${e.mom3m_entry!=null?(e.mom3m_entry>=0?'+':'')+e.mom3m_entry.toFixed(1)+'%':'—'}</td>
      </tr>`;
    }).join('');

    const diarioHTML = diario.map(ev=>{
      const tc = ev.trigger?.includes('drawdown')?'var(--red)':ev.trigger?.includes('regime')?'var(--blue)':'var(--gold3)';
      const vHTML = (ev.venduti||[]).map(e=>`
        <div style="display:flex;gap:8px;padding:4px 0;border-bottom:1px solid var(--border);font-size:10px">
          <span style="color:var(--red);font-weight:500;width:80px;flex-shrink:0">${e.ticker}</span>

          <span style="color:var(--gold3)">→</span>
          <span class="rot-in">${r.replaced_by||'—'}</span>
          <span style="color:var(--text2);font-size:9px">mom3M ${r.mom3m_in!=null?(r.mom3m_in>=0?'+':'')+r.mom3m_in.toFixed(1)+'%':'—'}</span>

    const n_ver = storia.length;

    return `<div class="linea-panel" id="panel-${lid}">

          <div style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--ink)">${meta.nome}</div>
          <div style="font-size:9px;color:var(--text2)">${meta.desc} · ${n_ver} versioni · ${n_rib} ribilanciamenti · ${rotazioni.length} rotazioni · Benchmark: ${meta.benchmark} · Soglia: ${meta.soglia}</div>
        </div>
      </div>
      ${rotAlert}
      <table class="etf-table">
        <thead><tr>
          <th>Ticker</th><th>Nome</th><th>Peso</th><th>Importo</th>

        </div>
        ${diarioHTML||'<div style="color:var(--text2);font-size:10px;padding:12px 0">Nessun ribilanciamento nel periodo</div>'}

  }).join('');

  return `

    <span class="section-eyebrow">Composizione</span>

function renderEquityChart(portafogli){
  const canvas = document.getElementById('equity-chart');
  if(!canvas) return;
  canvas.width = canvas.offsetWidth||1000;
  canvas.height = 340;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=340, P={t:20,r:120,b:36,l:72};
  const w=W-P.l-P.r, h=H-P.t-P.b;

  const allMesi = new Set();
  ['M','O','A'].forEach(lid=>{
    Object.keys(portafogli[lid]?.rendimenti_mensili||{}).forEach(m=>allMesi.add(m));
  });
  const mesiSorted = [...allMesi].sort();
  if(!mesiSorted.length) return;

  const curves = {};
  ['M','O','A'].forEach(lid=>{
    const rm = portafogli[lid]?.rendimenti_mensili||{};
    let val=100000; const pts=[val];
    mesiSorted.forEach(m=>{ val=val*(1+(rm[m]??0)/100); pts.push(Math.round(val)); });
    curves[lid]=pts;
  });

  const allVals = Object.values(curves).flat();
  const minV=Math.min(...allVals)*0.998, maxV=Math.max(...allVals)*1.002;
  const xS=i=>P.l+(i/mesiSorted.length)*w;
  const yS=v=>P.t+h-((v-minV)/(maxV-minV))*h;

  ctx.fillStyle='white'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=0.5;
  [0,0.25,0.5,0.75,1].forEach(t=>{
    const y=P.t+h*t;
    ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(P.l+w,y); ctx.stroke();
    const val=minV+(maxV-minV)*(1-t);
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.font='8px DM Mono,monospace';
    ctx.textAlign='right'; ctx.fillText('€'+Math.round(val/1000)+'k',P.l-4,y+3);
  });

  // Linea €100k
  const y100=yS(100000);
  ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(P.l,y100); ctx.lineTo(P.l+w,y100); ctx.stroke();
  ctx.setLineDash([]);

  // Mesi asse X
  const nomi=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
  ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.font='7px DM Mono,monospace'; ctx.textAlign='center';
  mesiSorted.forEach((m,i)=>{
    if(i%2===0){
      const [y,mo]=m.split('-');
      ctx.fillText(nomi[+mo]+(i===0||mo==='01'?' '+y.slice(2):''), xS(i+0.5), P.t+h+14);
    }
  });

  const lineaCol = { M:'#0EA5E9', O:'#8B5CF6', A:'#DC2626' };
  ['M','O','A'].forEach(lid=>{
    const pts=curves[lid]; if(!pts) return;
    const col=lineaCol[lid];
    ctx.beginPath();
    pts.forEach((v,i)=>i===0?ctx.moveTo(xS(i),yS(v)):ctx.lineTo(xS(i),yS(v)));
    ctx.strokeStyle=col; ctx.lineWidth=2.5; ctx.stroke();
    // Label finale
    const lv=pts[pts.length-1];
    ctx.fillStyle=col; ctx.font='bold 9px DM Mono,monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.fillText(`${lid} ${((lv-100000)/100000*100>=0?'+':'')+((lv-100000)/100000*100).toFixed(1)}%`, P.l+w+6, yS(lv));
  });
}

function renderHeatmap(portafogli){
  const wrap = document.getElementById('heatmap-wrap');
  if(!wrap) return;
  const linee=['M','O','A'];
  const allMesi=new Set();
  linee.forEach(lid=>Object.keys(portafogli[lid]?.rendimenti_mensili||{}).forEach(m=>allMesi.add(m)));
  const mesiSorted=[...allMesi].sort();
  const mesiLabel=mesiSorted.map(m=>{
    const[y,mo]=m.split('-');
    const n=['','Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
    return n[+mo]+' '+y.slice(2);
  });
  function hC(v){if(v==null||Math.abs(v)<0.15)return'#EDE8DF';if(v>0)return v>8?'#173404':v>5?'#27500A':v>3?'#3B6D11':v>1.5?'#639922':'#C0DD97';return v<-8?'#501313':v<-5?'#791F1F':v<-3?'#A32D2D':v<-1.5?'#E24B4A':'#F7C1C1';}
  function hT(v){if(v==null||Math.abs(v)<0.15)return'#9B9580';return Math.abs(v)>3?'rgba(255,255,255,0.95)':'rgba(0,0,0,0.7)';}
  const cW=40,cH=28,lblW=50,totW=56;
  let h=`<div style="display:grid;grid-template-columns:${lblW}px repeat(${mesiSorted.length},${cW}px) ${totW}px;gap:2px;font-family:'DM Mono',monospace">`;
  h+=`<div style="height:36px"></div>`;
  mesiLabel.forEach(m=>{h+=`<div style="height:36px;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;color:var(--text2);white-space:nowrap;transform:rotate(-45deg);display:block">${m}</span></div>`;});
  h+=`<div style="height:36px;display:flex;align-items:center;justify-content:center"><span style="font-size:8px;font-weight:600;color:var(--text)">TOT</span></div>`;
  const lineeCol={'M':'var(--M3)','O':'var(--O3)','A':'var(--A3)'};
  linee.forEach(lid=>{
    const rm=portafogli[lid]?.rendimenti_mensili||{};
    h+=`<div style="height:${cH}px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-size:10px;font-weight:600;color:${lineeCol[lid]}">${lid}</div>`;
    let cum=1;
    mesiSorted.forEach(m=>{const v=rm[m]??null;if(v!=null)cum*=(1+v/100);const bg=hC(v),tc=hT(v);const lbl=v!=null&&Math.abs(v)>=0.5?(v>0?'+':'')+v.toFixed(1):'';h+=`<div title="Linea ${lid} ${m}: ${v!=null?(v>=0?'+':'')+v.toFixed(2)+'%':'—'}" style="height:${cH}px;background:${bg};border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:500;color:${tc}">${lbl}</div>`;});
    const tot=(cum-1)*100;h+=`<div style="height:${cH}px;background:${hC(tot)};border-radius:2px;border:1.5px solid rgba(0,0,0,0.15);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${hT(tot)}">${tot>=0?'+':''}${tot.toFixed(1)}%</div>`;
  });
  h+='</div>';
  wrap.innerHTML=h;
}

function switchTab(lid){
  document.querySelectorAll('.linea-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.linea-panel').forEach(p=>p.classList.remove('active'));
  const tab=document.getElementById('tab-'+lid);
  const panel=document.getElementById('panel-'+lid);
  if(tab) tab.classList.add('active');
  if(panel) panel.classList.add('active');
}

async function render(){
  try{
    const data = await loadData();
    const portafogli = data.portafogli_3linee||{};
    const bm = data.benchmarks||{};

    let html = '';
    html += buildHero(data, portafogli);
    html += buildLineeSection(portafogli, bm);
    html += buildEquityChart(portafogli);
    html += buildHeatmap(portafogli);
    html += buildArchitettura();
    html += `<div style="text-align:center;padding:40px 0;border-top:1px solid var(--border);color:var(--text2);font-size:9px;letter-spacing:1px;margin-top:48px">
      COMPASS 3 Linee · Fase 1 — Portafogli Separati · Non costituisce consulenza d'investimento<br>
      Dati aggiornati al ${data.generated?new Date(data.generated).toLocaleString('it-IT'):'—'} · Regime: ${data.regime_oggi?.scenario||'—'} (${data.regime_oggi?.confidence||'—'}%)
    </div>`;

    document.getElementById('loading').style.display='none';
    const cont=document.getElementById('content');
    cont.innerHTML=html; cont.style.display='block';

    // Attiva prima tab
    switchTab('M');

    setTimeout(()=>{
      renderEquityChart(portafogli);
      renderHeatmap(portafogli);
    },150);

  }catch(e){
    document.getElementById('loading').innerHTML=`<div style="color:var(--red)">Errore: ${e.message}</div>`;
  }
}

render();
</script>
